<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback } = React;

// ─── CSV Parsing ────────────────────────────────────────────────────────────

function parseCSVFull(text) {
  // Use a proper state-machine parser that respects quoted newlines
  const rows = [];
  let cur = [], cell = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQ && text[i + 1] === '"') { cell += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      cur.push(cell); cell = "";
    } else if ((ch === '\n' || ch === '\r') && !inQ) {
      if (ch === '\r' && text[i + 1] === '\n') i++;
      cur.push(cell); cell = "";
      if (cur.some(c => c.trim())) rows.push(cur);
      cur = [];
    } else {
      cell += ch;
    }
  }
  if (cell || cur.length) { cur.push(cell); if (cur.some(c => c.trim())) rows.push(cur); }
  return rows;
}

// Detect file type from headers
function detectFileType(rows) {
  if (!rows.length) return null;
  const h = rows[0];
  if (h.includes("OverallScore")) return "student";
  if (h.includes("ItemDifficulty")) return "item";
  return null;
}

// Parse Canvas item analysis CSV
function parseItemCSV(rows, label) {
  const headers = rows[0];
  const toObj = row => { const o = {}; headers.forEach((h, i) => o[h] = row[i] ?? ""); return o; };
  const allRows = rows.slice(1).map(toObj);
  const summary = allRows[0];
  const items = allRows.filter(r => r.ItemID && r.ItemID.trim());
  return { type: "item", label, summary, items };
}

// Parse Canvas student analysis CSV
function parseStudentCSV(rows, label) {
  const headers = rows[0];
  // Item groups start at col 7, each group is 5 cols wide, last 5 cols are summary
  const itemGroups = [];
  let col = 7;
  while (col < headers.length - 5) {
    itemGroups.push({ col, itemId: null, question: (headers[col + 2] || "").replace(/\s+/g, " ").trim().slice(0, 80) });
    col += 5;
  }

  const students = rows.slice(1).map(row => {
    if (row.length < headers.length - 2) return null;
    const items = itemGroups.map(g => {
      const c = g.col;
      const earned = parseFloat(row[c + 3]);
      return {
        itemId: row[c] || "",
        answer: (row[c + 2] || "").replace(/<[^>]+>/g, "").trim(),
        earned: isNaN(earned) ? null : earned,
        status: row[c + 4] || ""
      };
    });
    const overall = parseFloat(row[row.length - 1]);
    const possible = parseFloat(row[row.length - 2]);
    return {
      name: row[0],
      studentId: (row[1] || "").trim(),
      section: row[3],
      correct: parseInt(row[row.length - 5]) || 0,
      incorrect: parseInt(row[row.length - 4]) || 0,
      noResponse: parseInt(row[row.length - 3]) || 0,
      overall: isNaN(overall) ? 0 : overall,
      possible: isNaN(possible) ? 0 : possible,
      pct: (!isNaN(overall) && !isNaN(possible) && possible > 0) ? Math.round((overall / possible) * 100) : 0,
      items
    };
  }).filter(Boolean);

  // Build per-item stats from student data
  const itemStats = itemGroups.map((g, idx) => {
    const attempted = students.filter(s => s.items[idx]?.status !== "Not Attempted");
    const correct = students.filter(s => s.items[idx]?.earned > 0);
    // Tally wrong answers
    const wrongTally = {};
    students.forEach(s => {
      const it = s.items[idx];
      if (it && it.status !== "Not Attempted" && it.earned === 0 && it.answer) {
        const ans = it.answer.trim();
        if (ans) wrongTally[ans] = (wrongTally[ans] || 0) + 1;
      }
    });
    const topWrong = Object.entries(wrongTally).sort((a, b) => b[1] - a[1])[0] || null;
    return {
      itemId: students[0]?.items[idx]?.itemId || "",
      totalStudents: students.length,
      attempted: attempted.length,
      correct: correct.length,
      pct: attempted.length > 0 ? Math.round((correct.length / attempted.length) * 100) : 0,
      topWrongAnswer: topWrong ? topWrong[0] : null,
      topWrongCount: topWrong ? topWrong[1] : 0,
      wrongTally
    };
  });

  // Score calculations
  const scores = students.map(s => s.pct);
  const mean = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : 0;
  const sorted = [...scores].sort((a, b) => a - b);
  const median = sorted.length ? sorted[Math.floor(sorted.length / 2)] : 0;
  const high = scores.length ? Math.max(...scores) : 0;
  const low = scores.length ? Math.min(...scores) : 0;

  // Grade distribution
  const gradeDist = {
    A: students.filter(s => s.pct >= 90).length,
    B: students.filter(s => s.pct >= 80 && s.pct < 90).length,
    C: students.filter(s => s.pct >= 70 && s.pct < 80).length,
    D: students.filter(s => s.pct >= 60 && s.pct < 70).length,
    F: students.filter(s => s.pct < 60).length,
  };

  // Proficiency: 70%+
  const proficient = students.filter(s => s.pct >= 70).length;
  const notProficient = students.filter(s => s.pct < 70).length;
  const proficiencyPct = students.length > 0 ? Math.round((proficient / students.length) * 100) : 0;

  return { type: "student", label, students, itemStats, mean, median, high, low, gradeDist, proficient, notProficient, proficiencyPct };
}

// Parse subgroup CSV - supports:
// Format A (one row per subgroup): Student ID, Student, Sub Group
// Format B (one row per student):  StudentID, StudentName, Subgroup1, Subgroup2, ...
function parseSubgroupCSV(rows) {
  if (!rows.length) return {};
  const headers = rows[0].map(h => h.trim());
  const idIdx = headers.findIndex(h => /student\s*id|^id$/i.test(h));
  const nameIdx = headers.findIndex(h => /^student$|student\s*name|^name$/i.test(h));
  const sgIdx = headers.findIndex(h => /sub\s*group/i.test(h));
  // Format A: single subgroup column - accumulate multiple rows per student into one entry
  if (sgIdx !== -1) {
    const map = {};
    rows.slice(1).forEach(row => {
      const id = idIdx !== -1 ? (row[idIdx] || "").trim() : "";
      const name = nameIdx !== -1 ? (row[nameIdx] || "").trim() : "";
      const sg = (row[sgIdx] || "").trim();
      if (!id && !name) return;
      const key = id || name;
      if (!map[key]) map[key] = { name, id, subgroups: [] };
      if (sg) map[key].subgroups.push(sg);
    });
    return map;
  }
  // Format B: multiple subgroup columns
  const subgroupCols = headers.map((h, i) => i).filter(i => i !== idIdx && i !== nameIdx && headers[i]);
  const map = {};
  rows.slice(1).forEach(row => {
    const id = idIdx !== -1 ? (row[idIdx] || "").trim() : "";
    const name = nameIdx !== -1 ? (row[nameIdx] || "").trim() : "";
    if (!id && !name) return;
    const key = id || name;
    const subgroups = subgroupCols.map(i => (row[i] || "").trim()).filter(Boolean);
    map[key] = { name, id, subgroups };
  });
  return map;
}

// Parse prior analytics CSV (generated by this app)
// Columns: StudentID, StudentName, Subgroups, then pairs: AssessmentName_Date, AssessmentName_Score
function parsePriorAnalyticsCSV(rows) {
  if (!rows.length) return {};
  const headers = rows[0].map(h => h.trim());
  // Find assessment columns (anything after the first 3 fixed cols)
  // Format: AssessmentName|Date and AssessmentName|Score alternating
  const fixedCols = 3; // ID, Name, Subgroups
  const assessments = [];
  for (let i = fixedCols; i < headers.length - 1; i += 2) {
    const dateCol = headers[i];
    const scoreCol = headers[i + 1];
    const name = dateCol.replace(/\|Date$/, "").trim();
    assessments.push({ name, dateColIdx: i, scoreColIdx: i + 1 });
  }
  // Returns map: studentId -> { name, subgroups: [], history: [{ assessment, date, score }] }
  const map = {};
  rows.slice(1).forEach(row => {
    const id = (row[0] || "").trim();
    const name = (row[1] || "").trim();
    if (!id && !name) return;
    const key = id || name;
    const subgroups = (row[2] || "").split(";").map(s => s.trim()).filter(Boolean);
    const history = [];
    assessments.forEach(a => {
      const date = (row[a.dateColIdx] || "").trim();
      const score = parseFloat(row[a.scoreColIdx]);
      if (date && !isNaN(score)) history.push({ assessment: a.name, date, score });
    });
    map[key] = { name, id, subgroups, history };
  });
  return map;
}

// ─── Classifiers ────────────────────────────────────────────────────────────

function classifyDifficulty(d) {
  const v = parseFloat(d);
  if (isNaN(v)) return { label: "N/A", color: "#9ca3af" };
  if (v >= 0.8) return { label: "Easy", color: "#16a34a" };
  if (v >= 0.5) return { label: "Moderate", color: "#d97706" };
  return { label: "Difficult", color: "#dc2626" };
}

function classifyDiscrimination(d) {
  const v = parseFloat(d);
  if (isNaN(v)) return { label: "N/A", color: "#9ca3af" };
  if (v >= 0.4) return { label: "Excellent", color: "#16a34a" };
  if (v >= 0.2) return { label: "Good", color: "#65a30d" };
  if (v >= 0.0) return { label: "Fair", color: "#d97706" };
  return { label: "Poor", color: "#dc2626" };
}

// ─── Pooled Item Statistics ──────────────────────────────────────────────────

function computePooledStats(teachers) {
  // Pool all students across all sections
  const allStudents = [];
  teachers.filter(t => t.student).forEach(t => {
    t.student.students.forEach(stu => {
      // Build item map: { itemId -> binary score (1/0) }
      const itemMap = {};
      t.student.itemStats.forEach((s, idx) => {
        const it = stu.items[idx];
        if (it && it.status !== "Not Attempted" && it.earned !== null) {
          itemMap[s.itemId] = it.earned > 0 ? 1 : 0;
        }
      });
      if (Object.keys(itemMap).length > 0) {
        allStudents.push({
          overall: stu.overall,
          possible: stu.possible,
          items: itemMap
        });
      }
    });
  });

  if (!allStudents.length) return {};

  // Pearson correlation helper
  const pearson = (x, y) => {
    const n = x.length;
    if (n < 3) return null;
    const mx = x.reduce((a,b)=>a+b,0)/n;
    const my = y.reduce((a,b)=>a+b,0)/n;
    const num = x.reduce((s,xi,i) => s + (xi-mx)*(y[i]-my), 0);
    const den = Math.sqrt(x.reduce((s,xi)=>s+(xi-mx)**2,0) * y.reduce((s,yi)=>s+(yi-my)**2,0));
    return den > 0 ? num/den : null;
  };

  // Get all unique item IDs
  const allItemIds = new Set();
  allStudents.forEach(s => Object.keys(s.items).forEach(id => allItemIds.add(id)));

  const pooled = {};
  allItemIds.forEach(itemId => {
    const relevant = allStudents.filter(s => itemId in s.items);
    const n = relevant.length;
    if (n === 0) return;

    const scores = relevant.map(s => s.items[itemId]);
    const difficulty = scores.reduce((a,b)=>a+b,0) / n;

    // Discrimination: top vs bottom 27%
    const k = Math.max(1, Math.round(n * 0.27));
    const sorted = [...relevant].sort((a,b) => a.overall - b.overall);
    const bottomPass = sorted.slice(0, k).filter(s => s.items[itemId] === 1).length / k;
    const topPass = sorted.slice(-k).filter(s => s.items[itemId] === 1).length / k;
    const discrimination = topPass - bottomPass;

    // CITC: correlate item score with total score (as proportion)
    const itemScores = relevant.map(s => s.items[itemId]);
    const totalPcts = relevant.map(s => s.possible > 0 ? s.overall / s.possible : 0);
    const citc = pearson(itemScores, totalPcts);

    pooled[itemId] = { n, difficulty, discrimination, citc, smallSample: n < 25 };
  });

  return pooled;
}

// ─── Growth & Subgroup Analysis ──────────────────────────────────────────────

function buildGrowthData(teachers, subgroupMap, priorMap, assessmentName) {
  // Gather all students with their current scores
  const allStudents = [];
  teachers.filter(t => t.student).forEach(t => {
    t.student.students.forEach(stu => {
      allStudents.push({ ...stu, teacherLabel: t.label });
    });
  });

  const totalStudents = allStudents.length;
  const classAvg = totalStudents > 0 ? Math.round(allStudents.reduce((a, s) => a + s.pct, 0) / totalStudents) : 0;

  // Match each student to subgroup info - try ID first, then name
  const getSubgroupInfo = (stu) => {
    if (!subgroupMap) return null;
    // Try by student ID (key in map)
    if (stu.studentId && subgroupMap[stu.studentId]) return subgroupMap[stu.studentId];
    // Try by name as key
    if (subgroupMap[stu.name]) return subgroupMap[stu.name];
    // Try scanning values for matching id or name
    return Object.values(subgroupMap).find(v => v.id === stu.studentId || v.name === stu.name) || null;
  };

  const getPriorInfo = (stu) => {
    if (!priorMap) return null;
    if (stu.studentId && priorMap[stu.studentId]) return priorMap[stu.studentId];
    if (priorMap[stu.name]) return priorMap[stu.name];
    return Object.values(priorMap).find(v => v.id === stu.studentId || v.name === stu.name) || null;
  };

  // Build enriched student list
  const enriched = allStudents.map(stu => {
    const sg = getSubgroupInfo(stu);
    const pr = getPriorInfo(stu);
    const subgroups = sg ? sg.subgroups : (pr ? pr.subgroups : []);
    const history = pr ? [...pr.history] : [];
    // Current assessment
    const currentDate = new Date().toISOString().split("T")[0];
    const currentEntry = { assessment: assessmentName || "Current", date: currentDate, score: stu.pct };

    // Determine risk status
    // Logic: derive prior risk state from history, then step accordingly
    const proficient = stu.pct >= 70;

    // Helper: derive what risk status a student would have had at a given history slice
    const deriveStatus = (hist) => {
      if (hist.length === 0) return "OK";
      const cur = hist[hist.length - 1];
      const prev = hist.length >= 2 ? hist[hist.length - 2] : null;
      const curProf = cur.score >= 70;
      const prevProf = prev ? prev.score >= 70 : null;
      if (!curProf) {
        // Not proficient — check if previously also not proficient
        if (prev && !prevProf) return "PERSISTENTLY_AT_RISK";
        return "AT_RISK";
      } else {
        // Proficient — check prior status to determine if recovering or cleared
        const priorStatus = hist.length >= 2 ? deriveStatus(hist.slice(0, -1)) : "OK";
        if (priorStatus === "PERSISTENTLY_AT_RISK") return "AT_RISK";   // step down one level
        if (priorStatus === "AT_RISK") return "RECOVERING";              // one more clear needed
        if (priorStatus === "RECOVERING") return "OK";                   // fully cleared
        return "OK";
      }
    };

    const priorStatus = deriveStatus(history);
    let riskStatus = "OK";
    if (!proficient) {
      // Not proficient this assessment
      if (priorStatus === "PERSISTENTLY_AT_RISK" || priorStatus === "AT_RISK") {
        riskStatus = "PERSISTENTLY_AT_RISK";
      } else {
        riskStatus = "AT_RISK";
      }
    } else {
      // Proficient this assessment — step down from prior status
      if (priorStatus === "PERSISTENTLY_AT_RISK") riskStatus = "AT_RISK";
      else if (priorStatus === "AT_RISK") riskStatus = "RECOVERING";
      else if (priorStatus === "RECOVERING") riskStatus = "OK";
      else riskStatus = "OK";
    }

    return { ...stu, subgroups, history, currentEntry, riskStatus, proficient };
  });

  // ── Subgroup analysis (groups > 20) ──
  const subgroupStats = {};
  if (subgroupMap || priorMap) {
    // Collect all unique subgroup names
    const allSubgroups = new Set();
    enriched.forEach(s => s.subgroups.forEach(sg => allSubgroups.add(sg)));

    allSubgroups.forEach(sgName => {
      const members = enriched.filter(s => s.subgroups.includes(sgName));
      if (members.length === 0) return;
      const avg = Math.round(members.reduce((a, s) => a + s.pct, 0) / members.length);
      const gap = avg - classAvg;
      const flagged = gap < -10;

      // Prior subgroup avg
      let priorAvg = null;
      const membersWithHistory = members.filter(s => s.history.length > 0);
      if (membersWithHistory.length > 0) {
        const lastScores = membersWithHistory.map(s => s.history[s.history.length - 1].score);
        priorAvg = Math.round(lastScores.reduce((a, b) => a + b, 0) / lastScores.length);
      }

      // Prior class avg (average of last history entry for all students with history)
      let priorClassAvg = null;
      const allWithHistory = enriched.filter(s => s.history.length > 0);
      if (allWithHistory.length > 0) {
        const lastAll = allWithHistory.map(s => s.history[s.history.length - 1].score);
        priorClassAvg = Math.round(lastAll.reduce((a, b) => a + b, 0) / lastAll.length);
      }

      let trend = null;
      if (priorAvg !== null && priorClassAvg !== null) {
        const priorGap = priorAvg - priorClassAvg;
        if (gap > priorGap + 2) trend = "closing";
        else if (gap < priorGap - 2) trend = "widening";
        else trend = "holding";
      }

      subgroupStats[sgName] = { name: sgName, count: members.length, avg, gap, flagged, trend, priorAvg, large: members.length > 20 };
    });
  }

  // Build analytics CSV data
  const buildAnalyticsCSV = () => {
    const allAssessments = new Set();
    enriched.forEach(s => s.history.forEach(h => allAssessments.add(h.assessment)));
    allAssessments.add(assessmentName || "Current");
    const assessList = [...allAssessments];

    const headerRow = ["StudentID", "StudentName", "Subgroups", ...assessList.flatMap(a => [`${a}|Date`, `${a}|Score`])];
    const dataRows = enriched.map(s => {
      const id = "";
      const subStr = s.subgroups.join(";");
      const assessCols = assessList.flatMap(a => {
        if (a === (assessmentName || "Current")) {
          return [s.currentEntry.date, s.pct.toString()];
        }
        const h = s.history.find(h => h.assessment === a);
        return h ? [h.date, h.score.toString()] : ["", ""];
      });
      return [id, s.name, subStr, ...assessCols];
    });

    const escape = (v) => (v.includes(",") || v.includes('"') || v.includes("\n")) ? `"${v.replace(/"/g, '""')}"` : v;
    const lines = [headerRow, ...dataRows].map(row => row.map(escape).join(","));
    return lines.join("\n");
  };

  return { enriched, subgroupStats, classAvg, totalStudents, buildAnalyticsCSV };
}

// ─── Report Builder (no API needed) ────────────────────────────────────────

function buildReport(teachers) {
  // ── Pre-aggregate everything before sending to AI ──────────────────────────

  // 0. Compute pooled discrimination and CITC from all student data
  const pooled = computePooledStats(teachers);

  // 1. Overall quiz stats (from item analysis summaries)
  const itemSummaries = teachers.filter(t => t.item).map(t => t.item.summary);
  const means = itemSummaries.map(s => parseFloat(s.QuizMeanScore)).filter(v => !isNaN(v));
  const medians = itemSummaries.map(s => parseFloat(s.QuizMedianScore)).filter(v => !isNaN(v));
  const highs = itemSummaries.map(s => parseFloat(s.QuizHighScore)).filter(v => !isNaN(v));
  const lows = itemSummaries.map(s => parseFloat(s.QuizLowScore)).filter(v => !isNaN(v));
  const overallMean = means.length ? (means.reduce((a,b)=>a+b,0)/means.length).toFixed(1) : "N/A";
  const overallMedian = medians.length ? (medians.reduce((a,b)=>a+b,0)/medians.length).toFixed(1) : "N/A";
  const overallHigh = highs.length ? Math.max(...highs).toFixed(1) : "N/A";
  const overallLow = lows.length ? Math.min(...lows).toFixed(1) : "N/A";

  // 2. Aggregate item stats across all item analysis files
  // itemId -> { correct, total, difficulties[], discriminations[], topDistractor, topDistractorCount }
  const itemAgg = {};
  teachers.filter(t => t.item).forEach(t => {
    t.item.items.forEach(itm => {
      const id = itm.ItemID;
      if (!id) return;
      const correct = parseInt(itm.Correct) || 0;
      const incorrect = parseInt(itm.Incorrect) || 0;
      const total = correct + incorrect;
      const diff = parseFloat(itm.ItemDifficulty);
      const disc = parseFloat(itm.DiscriminationIndex);
      if (!itemAgg[id]) itemAgg[id] = { correct:0, total:0, difficulties:[], discriminations:[], citcs:[], topDistractor:"", topDistractorCount:0, title:"" };
      if (itm.Title && itm.Title.trim()) itemAgg[id].title = itm.Title.trim();
      itemAgg[id].correct += correct;
      itemAgg[id].total += total;
      if (!isNaN(diff)) itemAgg[id].difficulties.push(diff);
      if (!isNaN(disc)) itemAgg[id].discriminations.push(disc);
      const citc = parseFloat(itm.CorrectedItemTotalCorrelation);
      if (!isNaN(citc)) itemAgg[id].citcs.push(citc);
      // Take distractor from item analysis AnswerFrequencies
      try {
        const af = JSON.parse(itm.AnswerFrequencies);
        (af.blanks || []).forEach(b => {
          const wrong = (b.answers || []).filter(a => !a.correct && a.count > 0).sort((a,b) => b.count - a.count);
          if (wrong.length && wrong[0].count > itemAgg[id].topDistractorCount) {
            itemAgg[id].topDistractor = wrong[0].answer;
            itemAgg[id].topDistractorCount = wrong[0].count;
          }
        });
      } catch(_) {}
    });
  });

  // 3. Aggregate wrong answers from student analysis files (more accurate than item analysis)
  // itemId -> { attempted, correct, wrongTally{}, studentsWrongByTeacher: {label: [names]} }
  const studentAgg = {};
  teachers.filter(t => t.student).forEach(t => {
    t.student.itemStats.forEach(s => {
      const id = s.itemId;
      if (!id) return;
      if (!studentAgg[id]) studentAgg[id] = { attempted:0, correct:0, wrongTally:{}, studentsWrongByTeacher:{} };
      studentAgg[id].attempted += s.attempted;
      studentAgg[id].correct += s.correct;
      // Merge the full wrongTally from each section
      Object.entries(s.wrongTally || {}).forEach(([ans, cnt]) => {
        studentAgg[id].wrongTally[ans] = (studentAgg[id].wrongTally[ans] || 0) + cnt;
      });
    });
    // Track which students got each item wrong, grouped by teacher label
    t.student.students.forEach(stu => {
      t.student.itemStats.forEach(s => {
        const id = s.itemId;
        if (!id || !studentAgg[id]) return;
        const idx = t.student.itemStats.indexOf(s);
        const it = stu.items[idx];
        if (it && it.status !== "Not Attempted" && it.earned === 0) {
          if (!studentAgg[id].studentsWrongByTeacher[t.label]) {
            studentAgg[id].studentsWrongByTeacher[t.label] = [];
          }
          studentAgg[id].studentsWrongByTeacher[t.label].push(stu.name);
        }
      });
    });
  });

  // 4. Student proficiency aggregated
  const allStudentData = teachers.filter(t => t.student).map(t => t.student);
  const totalStudents = allStudentData.reduce((a,s) => a + s.students.length, 0);
  const totalProficient = allStudentData.reduce((a,s) => a + s.proficient, 0);
  const proficiencyPct = totalStudents > 0 ? Math.round((totalProficient/totalStudents)*100) : 0;
  const gradeDist = { A:0, B:0, C:0, D:0, F:0 };
  allStudentData.forEach(s => { Object.keys(gradeDist).forEach(g => gradeDist[g] += s.gradeDist[g]); });

  // ── Build prompt text ───────────────────────────────────────────────────────

  // Overall stats block
  let statsBlock = `COMBINED QUIZ STATS (${teachers.filter(t=>t.item).length} sections):\n`;
  statsBlock += `Mean: ${overallMean}% | Median: ${overallMedian}% | High: ${overallHigh}% | Low: ${overallLow}%\n`;
  if (totalStudents > 0) {
    statsBlock += `Students: ${totalStudents} total | Proficient (>=70%): ${totalProficient} (${proficiencyPct}%) | Not proficient: ${totalStudents - totalProficient}\n`;
    statsBlock += `Grade distribution: A(90%+): ${gradeDist.A} | B(80-89%): ${gradeDist.B} | C(70-79%): ${gradeDist.C} | D(60-69%): ${gradeDist.D} | F(<60%): ${gradeDist.F}\n`;
  }

  // ── Pre-compute strength and priority lists ─────────────────────────────────

  // Strength: difficulty >= 0.80 AND quality metrics are healthy or borderline
  // Weak quality items (disc < 0.20 OR CITC < 0.30) at high difficulty go to Potential Review instead
  const strengthItems = Object.entries(itemAgg)
    .filter(([id, agg]) => {
      if (!agg.difficulties.length) return false;
      const p = pooled[id];
      const diff = p ? p.difficulty : Math.min(...agg.difficulties);
      if (diff < 0.80) return false;
      // Exclude items where quality metrics are weak (those go to Potential Review)
      const disc = p ? p.discrimination : null;
      const citc = p ? p.citc : null;
      const weakDisc = disc !== null && disc < 0.20;
      const weakCITC = citc !== null && citc < 0.30;
      return !weakDisc && !weakCITC;
    })
    .map(([id, agg]) => {
      const p = pooled[id];
      const finalPct = p ? Math.round(p.difficulty * 100) : (agg.total > 0 ? Math.round((agg.correct/agg.total)*100) : 0);
      const combinedDiff = p ? p.difficulty : Math.min(...agg.difficulties);
      const combinedDisc = p ? p.discrimination : null;
      const combinedCITC = p ? p.citc : null;
      return { id, title: agg.title || "", finalPct, combinedDiff, combinedDisc, combinedCITC };
    })
    .sort((a, b) => a.combinedDiff - b.combinedDiff)  // closest to 0.80 first
    .slice(0, 5);

  let strengthBlock = `ITEMS WITH HIGH MASTERY (all sections ≥ 0.80 difficulty — copy these exactly):\n`;
  if (strengthItems.length === 0) {
    strengthBlock += `  None — no items had all sections at difficulty ≥ 0.80\n`;
  } else {
    strengthItems.forEach(s => {
      strengthBlock += `  Item ${s.id}: ${s.finalPct}% correct (difficulty ${s.combinedDiff.toFixed(2)})\n`;
    });
  }

  // Priority: use pooled stats where available, fall back to itemAgg ranges
  // Flags based on pooled values (more reliable); small sample items get a warning
  // Build all flagged items, then split into priority vs review
  const allFlaggedItems = Object.entries(itemAgg)
    .filter(([id, agg]) => {
      if (!agg.difficulties.length) return false;
      const p = pooled[id];
      const diff = p ? p.difficulty : Math.min(...agg.difficulties);
      const disc = p ? p.discrimination : (agg.discriminations.length > 0 ? Math.min(...agg.discriminations) : null);
      const citc = p ? p.citc : (agg.citcs.length > 0 ? Math.min(...agg.citcs) : null);
      const lowDiff = diff < 0.55;
      const lowDisc = disc !== null && disc < 0.20;
      const lowCITC = citc !== null && citc < 0.30;
      const combined = diff < 0.80 && (lowDisc || lowCITC);
      return lowDiff || combined || lowDisc || lowCITC;
    })
    .map(([id, agg]) => {
      const sa = studentAgg[id];
      const p = pooled[id];
      const combinedDiff = p ? p.difficulty : (agg.total > 0 ? agg.correct/agg.total : 0);
      const combinedDisc = p ? p.discrimination : null;
      const combinedCITC = p ? p.citc : null;
      const combinedN = p ? p.n : (sa ? sa.attempted : agg.total);
      const smallSample = p ? p.smallSample : combinedN < 25;
      const finalPct = Math.round(combinedDiff * 100);
      const finalIncorrect = sa ? (sa.attempted - sa.correct) : (agg.total - agg.correct);
      const lowDiff = combinedDiff < 0.55;
      const lowDisc = combinedDisc !== null && combinedDisc < 0.20;
      const lowCITC = combinedCITC !== null && combinedCITC < 0.30;

      let flag;
      if (lowDiff && lowDisc && lowCITC) flag = "LOW DIFFICULTY + LOW DISCRIMINATION + LOW CITC";
      else if (lowDiff && lowDisc) flag = "LOW DIFFICULTY + LOW DISCRIMINATION";
      else if (lowDiff && lowCITC) flag = "LOW DIFFICULTY + LOW CITC";
      else if (lowDiff) flag = "LOW DIFFICULTY";
      else if (lowDisc && lowCITC) flag = "LOW DISCRIMINATION + LOW CITC";
      else if (lowDisc) flag = "LOW DISCRIMINATION";
      else flag = "LOW CITC";

      // Review-only: difficulty >= 0.80 AND no LOW DIFFICULTY flag
      // High mastery items with weak quality metrics are likely floor effects, not urgent
      const isReviewOnly = combinedDiff >= 0.80 && !lowDiff;

      let topWrong = "";
      if (sa) {
        const top = Object.entries(sa.wrongTally).sort((a,b) => b[1]-a[1])[0];
        if (top) topWrong = `"${top[0]}" (n=${top[1]})`;
      } else if (agg.topDistractor) {
        topWrong = `"${agg.topDistractor}" (n=${agg.topDistractorCount})`;
      }

      return {
        id, title: agg.title || "", finalPct, finalIncorrect, flag, isReviewOnly, smallSample, combinedN,
        combinedDiff, combinedDisc, combinedCITC, topWrong,
        minDiff: Math.min(...agg.difficulties), maxDiff: Math.max(...agg.difficulties),
        studentsWrongByTeacher: studentAgg[id]?.studentsWrongByTeacher || {}
      };
    });

  const countFlags = p => (p.flag.match(/LOW DIFFICULTY/) ? 1 : 0) + (p.flag.match(/LOW DISCRIMINATION/) ? 1 : 0) + (p.flag.match(/LOW CITC/) ? 1 : 0);
  const flagSort = (a, b) => { const d = countFlags(b) - countFlags(a); return d !== 0 ? d : a.combinedDiff - b.combinedDiff; };

  const priorityItems = allFlaggedItems.filter(p => !p.isReviewOnly).sort(flagSort);
  const reviewItems = allFlaggedItems.filter(p => p.isReviewOnly).sort((a,b) => a.combinedDiff - b.combinedDiff);

  return {
    overallMean, overallMedian, overallHigh, overallLow,
    totalStudents, totalProficient, proficiencyPct, gradeDist,
    strengthItems, priorityItems, reviewItems
  };
}

          ))}

          <div style={{ marginBottom: "0.5rem" }}>

              <span style={{ color: student.proficiencyPct >= 70 ? "#16a34a" : "#dc2626" }}>{student.proficiencyPct}%</span>
            </div>
            <div style={{ height: 8, background: "#e5e7eb", borderRadius: 4, overflow: "hidden" }}>
              <div style={{ width: student.proficiencyPct + "%", height: "100%", background: student.proficiencyPct >= 70 ? "#16a34a" : student.proficiencyPct >= 50 ? "#d97706" : "#dc2626", borderRadius: 4 }} />
            </div>
            <div style={{ fontSize: "0.68rem", color: "#6b7280", marginTop: "0.15rem" }}>
              {student.proficient} proficient · {student.notProficient} not proficient · {student.students.length} total
            </div>
          </div>
          {/* Grade distribution bar chart */}
          <div>
            <div style={{ fontSize: "0.68rem", fontWeight: 700, color: "#6b7280", marginBottom: "0.3rem", textTransform: "uppercase", letterSpacing: "0.05em" }}>Grade Distribution</div>
            {(() => {
              const PX_PER = 3;
              const maxCount = Math.max(...Object.values(student.gradeDist), 1);
              const chartH = maxCount * PX_PER + 16;
              return (
                <div style={{ display: "flex", alignItems: "flex-end", gap: "0.2rem", height: chartH }}>
                  {[["A","#16a34a"],["B","#65a30d"],["C","#d97706"],["D","#ea580c"],["F","#dc2626"]].map(([g, color]) => {
                    const count = student.gradeDist[g];
                    const barH = count * PX_PER;
                    return (
                      <div key={g} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: "0.1rem", justifyContent: "flex-end" }}>
                        {count > 0 && <div style={{ fontSize: "0.58rem", fontWeight: 700, color }}>{count}</div>}

                        <div style={{ fontSize: "0.6rem", fontWeight: 700, color, lineHeight: 1 }}>{g}</div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Main App ────────────────────────────────────────────────────────────────

function App() {
  const [teachers, setTeachers] = useState([]); // [{ label, item, student }]
  const [report, setReport] = useState(null);
  const [error, setError] = useState("");
  const [dragOver, setDragOver] = useState(false);
  const [activeTab, setActiveTab] = useState("upload");
  const [pendingLabel, setPendingLabel] = useState(null);
  const [itemTableOpen, setItemTableOpen] = useState(true);
  const [studentTableOpen, setStudentTableOpen] = useState(true);
  const [openStudentLists, setOpenStudentLists] = useState({});
  const toggleStudentList = (id) => setOpenStudentLists(prev => ({ ...prev, [id]: !prev[id] }));
  const [subgroupMap, setSubgroupMap] = useState(null);
  const [priorMap, setPriorMap] = useState(null);
  const [assessmentName, setAssessmentName] = useState("");
  const [growthData, setGrowthData] = useState(null);
  const [csvModalOpen, setCsvModalOpen] = useState(false);
  const [csvContent, setCsvContent] = useState("");

  const processFiles = useCallback(async (fileList, forLabel = null) => {
    setError("");
    for (const file of Array.from(fileList)) {
      if (!file.name.endsWith(".csv")) continue;
      try {
        const text = await file.text();
        const rows = parseCSVFull(text);

        const lname = file.name.toLowerCase();

        // Check for subgroup file
        if (lname.includes("subgroup")) {
          setSubgroupMap(parseSubgroupCSV(rows));
          continue;
        }

        // Check for prior analytics file
        if (lname.includes("analytics") || lname.includes("prior")) {
          setPriorMap(parsePriorAnalyticsCSV(rows));
          continue;
        }

        const type = detectFileType(rows);
        if (!type) { setError(`Could not detect file type for "${file.name}". Make sure it's a Canvas item or student analysis CSV.`); continue; }

        // Parse assessment name from filename: e.g. "Smith Unit9Quiz1 Item.csv" -> "Unit9Quiz1"
        const baseName = file.name.replace(/\.csv$/i, "");
        const nameMatch = baseName.match(/^(\S+)\s+(.+?)\s+(item|student)$/i);
        if (nameMatch && nameMatch[2] && !assessmentName) {
          setAssessmentName(nameMatch[2].replace(/\s+/g, ""));
        }

        // Derive label: use forLabel if patching, else from filename
        // Strip item/student suffix, underscores, and the assessment name portion leaving just the teacher name
        const fileLabel = forLabel || (() => {
          let lbl = baseName
            .replace(/[_-]?(item[_-]?analysis|student[_-]?analysis|item|student)[_-]?/gi, "")
            .replace(/[_-]/g, " ").trim();
          // If we parsed an assessment name, strip it from the label too
          if (nameMatch && nameMatch[2]) {
            const assessPart = nameMatch[2].replace(/[_-]/g, " ").trim();
            lbl = lbl.replace(assessPart, "").trim();
          }
          return lbl || baseName;
        })();

        const parsed = type === "item" ? parseItemCSV(rows, fileLabel) : parseStudentCSV(rows, fileLabel);

        setTeachers(prev => {
          const existing = prev.find(t => t.label === fileLabel);
          if (existing) {
            return prev.map(t => t.label === fileLabel ? { ...t, [type]: parsed } : t);
          }
          return [...prev, { label: fileLabel, item: type === "item" ? parsed : null, student: type === "student" ? parsed : null }];
        });
      } catch (e) {
        setError(`Error parsing "${file.name}": ${e.message}`);
      }
    }
    setPendingLabel(null);
  }, [assessmentName]);

  const handleDrop = useCallback((e) => {
    e.preventDefault(); setDragOver(false);
    processFiles(e.dataTransfer.files, pendingLabel);
  }, [processFiles, pendingLabel]);

  const removeTeacher = (label) => setTeachers(prev => prev.filter(t => t.label !== label));

  const triggerAddFile = (label) => {
    setPendingLabel(label);
    document.getElementById("fileInAdd").click();
  };

  const generateReport = () => {
    if (!teachers.length) return;
    setReport(buildReport(teachers));
    const gd = buildGrowthData(teachers, subgroupMap, priorMap, assessmentName);
    setGrowthData(gd);
    setActiveTab("analysis");
    setTimeout(() => {
      const el = document.getElementById("report-top");
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      else window.scrollTo({ top: 0, behavior: "smooth" });
    }, 50);
  };

  const TAB = (id) => ({
    padding: "0.45rem 1.1rem", border: "none", cursor: "pointer",
    fontSize: "0.82rem", fontWeight: 600, fontFamily: "inherit",
    borderRadius: "7px 7px 0 0",
    background: activeTab === id ? "white" : "rgba(255,255,255,0.18)",
    color: activeTab === id ? "#1e3a8a" : "white",
    transition: "all 0.15s",
  });

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", background: "#eef2ff", fontFamily: "'DM Sans', sans-serif", overflow: "hidden" }}>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

      {/* Header */}
      <div className="no-print" style={{ background: "linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%)", padding: "1.5rem 2rem 0", boxShadow: "0 4px 24px rgba(30,58,138,0.35)", flexShrink: 0 }}>
        <div style={{ maxWidth: 960, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "0.6rem" }}>
            <span style={{ fontSize: "1.7rem" }}>📚</span>
            <div>
              <h1 style={{ margin: 0, color: "white", fontSize: "1.4rem", fontFamily: "'Playfair Display', serif" }}>Canvas Quiz Analyzer</h1>
              <p style={{ margin: 0, color: "#bfdbfe", fontSize: "0.78rem" }}>Upload item &amp; student analysis CSVs per teacher · Compare sections · Generate your Quiz Report</p>
            </div>
          </div>
          <div style={{ display: "flex", gap: "0.4rem", marginTop: "1rem" }}>
            {[["upload","📁 Upload"], ["data","📊 Data"], ["analysis","📋 Report"]].map(([id, lbl]) => (
              <button key={id} onClick={() => setActiveTab(id)} style={TAB(id)}>{lbl}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Scrollable content */}
      <div style={{ flex: 1, overflowY: "auto" }}>
        <div style={{ maxWidth: 960, margin: "0 auto", padding: "1.5rem 1.5rem 4rem" }}>

          {error && <div style={{ background: "#fef2f2", border: "1px solid #fca5a5", borderRadius: 8, padding: "0.7rem 1rem", marginBottom: "1rem", color: "#b91c1c", fontSize: "0.85rem" }}>⚠️ {error}</div>}

          {/* Hidden input for "add missing file" */}
          <input id="fileInAdd" type="file" accept=".csv" multiple onChange={e => processFiles(e.target.files, pendingLabel)} style={{ display: "none" }} />

          {/* ── UPLOAD TAB ── */}
          {activeTab === "upload" && (
            <div>
              <div
                onDrop={handleDrop}
                onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onClick={() => document.getElementById("fileIn").click()}
                style={{
                  border: `2.5px dashed ${dragOver ? "#3b82f6" : "#93c5fd"}`,
                  borderRadius: 16, padding: "2.5rem 2rem", textAlign: "center",
                  background: dragOver ? "#eff6ff" : "white", cursor: "pointer",
                  transition: "all 0.2s", boxShadow: "0 2px 16px rgba(30,58,138,0.08)"
                }}
              >
                <div style={{ fontSize: "2.5rem", marginBottom: "0.6rem" }}>📂</div>
                <p style={{ margin: "0 0 0.35rem", fontSize: "1.05rem", fontWeight: 700, color: "#1e3a8a" }}>Drop CSV files here</p>
                <p style={{ margin: "0 0 0.75rem", color: "#6b7280", fontSize: "0.85rem" }}>
                  Drop item &amp; student analysis files — name them <em>Teacher Item.csv</em> and <em>Teacher Student.csv</em>.<br/>
                  Optionally add <em>Subgroups.csv</em> and a prior <em>Analytics.csv</em> for growth tracking.
                </p>
                <div style={{ display: "flex", justifyContent: "center", gap: "0.5rem", flexWrap: "wrap", marginBottom: "1rem" }}>
                  {["Smith Item.csv", "Smith Student.csv", "Subgroups.csv", "Prior Analytics.csv"].map(f => (
                    <span key={f} style={{ background: "#dbeafe", color: "#1e40af", borderRadius: 20, padding: "0.2rem 0.6rem", fontSize: "0.75rem", fontWeight: 600 }}>{f}</span>
                  ))}
                </div>
                <button style={{ background: "#1d4ed8", color: "white", border: "none", borderRadius: 8, padding: "0.55rem 1.4rem", fontSize: "0.875rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                  Browse Files
                </button>
                <input id="fileIn" type="file" accept=".csv" multiple onChange={e => processFiles(e.target.files)} style={{ display: "none" }} />
              </div>

              {(teachers.length > 0 || subgroupMap || priorMap) && (
                <div style={{ marginTop: "1rem", background: "white", borderRadius: 12, padding: "0.85rem 1rem", boxShadow: "0 2px 12px rgba(30,58,138,0.06)", border: "1px solid #e0e7ff" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.5rem" }}>
                    <span style={{ color: "#6b7280", fontSize: "0.78rem", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.04em" }}>Files Loaded — keep adding until ready</span>
                    <button onClick={() => setActiveTab("data")} style={{ background: "#1d4ed8", color: "white", border: "none", borderRadius: 8, padding: "0.4rem 1rem", fontSize: "0.82rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                      View Data →
                    </button>
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: "0.4rem" }}>
                    {teachers.map(t => (
                      <span key={t.label} style={{ background: "#dbeafe", color: "#1e40af", borderRadius: 20, padding: "0.25rem 0.7rem", fontSize: "0.8rem", fontWeight: 600, display: "flex", alignItems: "center", gap: "0.35rem" }}>
                        {t.label} {t.item && t.student ? "✓✓" : "✓"}
                        <span onClick={() => removeTeacher(t.label)} style={{ cursor: "pointer", color: "#3b82f6", fontWeight: 700 }}>✕</span>
                      </span>
                    ))}
                    {subgroupMap && <span style={{ background: "#dcfce7", color: "#15803d", borderRadius: 20, padding: "0.25rem 0.7rem", fontSize: "0.8rem", fontWeight: 600 }}>✓ Subgroups</span>}
                    {priorMap && <span style={{ background: "#fef9c3", color: "#92400e", borderRadius: 20, padding: "0.25rem 0.7rem", fontSize: "0.8rem", fontWeight: 600 }}>✓ Prior Analytics</span>}
                  </div>
                </div>

                      {/* ── STUDENT GROWTH & RISK TRACKING ── */}
                      {growthData && (() => {

                        // Group by teacher, then sort within each group
                        const byTeacher = {};
                        growthData.enriched.forEach(s => {

                        const anyFlagged = growthData.enriched.some(s => s.riskStatus !== "OK");

                            {!hasPrior ? (

                      {growthData && Object.values(growthData.subgroupStats).some(sg => !sg.large) && (() => {

                                const sorted = [...members].sort((a, b) => (riskOrder[a.riskStatus] ?? 3) - (riskOrder[b.riskStatus] ?? 3) || a.name.localeCompare(b.name));

                              if (allRows.length === 0) return null;
                              const hasPrior = allRows.some(s => s.history.length > 0);
                              const avgPct = Math.round(allRows.reduce((a, s) => a + s.pct, 0) / allRows.length);
                              return (
                                <div key={sg.name} style={{ background: "white", border: "1px solid #e0e7ff", borderRadius: 10, overflow: "hidden", marginBottom: "1rem" }}>
                                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0.6rem 0.85rem", background: "#f0f4ff", borderBottom: "1px solid #e0e7ff" }}>
                                    <span style={{ fontWeight: 700, color: "#1e3a8a", fontSize: "0.88rem" }}>{sg.name} <span style={{ fontWeight: 400, color: "#6b7280", fontSize: "0.75rem" }}>· {allRows.length} student{allRows.length !== 1 ? "s" : ""}</span></span>
                                    <span style={{ fontSize: "0.75rem", color: "#6b7280", fontWeight: 600 }}>Avg: {avgPct}%</span>
                                  </div>
                                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.82rem" }}>
                                    <thead>
                                      <tr style={{ background: "#f8fafc" }}>
                                        <th style={{ padding: "0.4rem 0.75rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "1px solid #e5e7eb", fontSize: "0.72rem", width: "12%" }}>Teacher</th>
                                        <th style={{ padding: "0.4rem 0.75rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "1px solid #e5e7eb", fontSize: "0.72rem" }}>Student</th>
                                        <th style={{ padding: "0.4rem 0.75rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "1px solid #e5e7eb", fontSize: "0.72rem" }}>Status</th>
                                        <th style={{ padding: "0.4rem 0.75rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "1px solid #e5e7eb", fontSize: "0.72rem" }}>{hasPrior ? "Score History → Current" : "Current Score"}</th>
                                      </tr>
                                    </thead>
                                    <tbody>
                                      {allRows.map((s, i) => {
                                        const rl = riskLabels[s.riskStatus] || riskLabels["OK"];
                                        return (
                                          <tr key={s.name} style={{ borderBottom: "1px solid #f3f4f6", background: i % 2 === 0 ? "white" : "#fafafa" }}>
                                            <td style={{ padding: "0.45rem 0.75rem", fontWeight: 700, color: "#1e3a8a", fontSize: "0.78rem", verticalAlign: "middle", borderRight: "2px solid #e0e7ff", background: "#f8fafc" }}>
                                              {s.firstInTeacher ? s.teacherKey : ""}
                                            </td>
                                            <td style={{ padding: "0.45rem 0.75rem", fontWeight: 600, color: "#374151" }}>{s.name}</td>
                                            <td style={{ padding: "0.45rem 0.75rem" }}>
                                              <span style={{ background: rl.bg, color: rl.color, borderRadius: 4, padding: "0.15rem 0.5rem", fontSize: "0.68rem", fontWeight: 800, whiteSpace: "nowrap" }}>{rl.label}</span>
                                            </td>
                                            <td style={{ padding: "0.45rem 0.75rem" }}>
                                              <div style={{ display: "flex", alignItems: "center", gap: "0.25rem", flexWrap: "wrap" }}>
                                                {s.history.map((h, hi) => (
                                                  <span key={hi} style={{ background: h.score >= 70 ? "#dcfce7" : "#fee2e2", color: h.score >= 70 ? "#16a34a" : "#dc2626", borderRadius: 3, padding: "0.15rem 0.4rem", fontSize: "0.72rem", fontWeight: 700 }} title={h.assessment}>{h.score}%</span>
                                                ))}
                                                {s.history.length > 0 && <span style={{ color: "#9ca3af", fontSize: "0.65rem" }}>→</span>}
                                                <span style={{ background: s.proficient ? "#dcfce7" : "#fee2e2", color: s.proficient ? "#16a34a" : "#dc2626", borderRadius: 3, padding: "0.15rem 0.4rem", fontSize: "0.72rem", fontWeight: 800, outline: "2px solid currentColor", outlineOffset: 1 }}>{s.pct}%</span>
                                              </div>
                                            </td>
                                          </tr>
                                        );
                                      })}
                                    </tbody>
                                  </table>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })()}

                      {/* ── PDF EXPORT ── */}
                      <div style={{ marginTop: "2rem", background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 10, padding: "1rem 1.25rem" }}>
                        <div style={{ fontWeight: 700, color: "#15803d", fontSize: "0.9rem", marginBottom: "0.35rem" }}>🖨️ Save Report as PDF</div>
                        <p style={{ fontSize: "0.78rem", color: "#4b5563", margin: "0 0 0.75rem" }}>
                          Downloads a PDF of the full Data and Report tabs so your team can save it to your shared drive for future reference.
                        </p>
                        <button
                          onClick={async () => {
                            const { jsPDF } = window.jspdf;
                            const btn = document.querySelector(".pdf-export-btn");
                            if (btn) btn.textContent = "⏳ Generating PDF...";

                            // Temporarily expand the scroll container so everything renders
                            const scrollEl = document.querySelector("#root > div > div:last-child");
                            const prevOverflow = scrollEl ? scrollEl.style.overflowY : "";
                            const prevHeight = scrollEl ? scrollEl.style.height : "";
                            if (scrollEl) { scrollEl.style.overflowY = "visible"; scrollEl.style.height = "auto"; }
                            const rootEl = document.querySelector("#root > div");
                            const prevRootHeight = rootEl ? rootEl.style.height : "";
                            if (rootEl) rootEl.style.height = "auto";

                            // Target the report card
                            const reportEl = document.getElementById("report-top");
                            const target = reportEl ? reportEl.parentElement : document.querySelector(".tab-analysis");

                            await new Promise(r => setTimeout(r, 100));

                            try {
                              const canvas = await html2canvas(target, {
                                scale: 1.5,
                                useCORS: true,
                                logging: false,
                                backgroundColor: "#ffffff",
                                scrollX: 0,
                                scrollY: 0,
                                windowWidth: target.scrollWidth,
                                windowHeight: target.scrollHeight,
                              });

                              const imgData = canvas.toDataURL("image/jpeg", 0.92);
                              const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

                              const pageW = pdf.internal.pageSize.getWidth();
                              const pageH = pdf.internal.pageSize.getHeight();
                              const margin = 10;
                              const contentW = pageW - margin * 2;

                              const imgW = canvas.width;
                              const imgH = canvas.height;
                              const ratio = contentW / (imgW / 1.5 * (25.4 / 96));
                              const scaledW = contentW;
                              const scaledH = (imgH / 1.5) * (25.4 / 96) * ratio;

                              const pageContentH = pageH - margin * 2;
                              let yOffset = 0;
                              let page = 0;

                              while (yOffset < scaledH) {
                                if (page > 0) pdf.addPage();
                                // Crop the portion of the image for this page
                                const srcY = (yOffset / scaledH) * imgH;
                                const srcH = Math.min((pageContentH / scaledH) * imgH, imgH - srcY);
                                const pageCanvas = document.createElement("canvas");
                                pageCanvas.width = imgW;
                                pageCanvas.height = srcH;
                                const ctx = pageCanvas.getContext("2d");
                                ctx.drawImage(canvas, 0, srcY, imgW, srcH, 0, 0, imgW, srcH);
                                const pageImg = pageCanvas.toDataURL("image/jpeg", 0.92);
                                const sliceH = (srcH / imgH) * scaledH;
                                pdf.addImage(pageImg, "JPEG", margin, margin, scaledW, sliceH);
                                yOffset += pageContentH;
                                page++;
                              }

                              pdf.save((assessmentName || "Assessment") + "_Report.pdf");
                            } catch(e) {
                              alert("PDF generation failed: " + e.message);
                            } finally {
                              if (scrollEl) { scrollEl.style.overflowY = prevOverflow; scrollEl.style.height = prevHeight; }
                              if (rootEl) rootEl.style.height = prevRootHeight;
                              if (btn) btn.textContent = "⬇ Download PDF";
                            }
                          }}
                          className="pdf-export-btn"
                          style={{ background: "#16a34a", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.2rem", fontSize: "0.85rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                          ⬇ Download PDF
                        </button>
                        <p style={{ fontSize: "0.72rem", color: "#6b7280", margin: "0.6rem 0 0" }}>
                          Captures the full report as a PDF — charts, tables, and all. May take a few seconds to generate.
                        </p>
                      </div>

                      {/* ── ANALYTICS CSV EXPORT ── */}
                      {growthData && (
                        <div style={{ marginTop: "2rem", background: "#f0f4ff", border: "1px solid #c7d2fe", borderRadius: 10, padding: "1rem 1.25rem" }}>
                          <div style={{ fontWeight: 700, color: "#1e3a8a", fontSize: "0.9rem", marginBottom: "0.35rem" }}>📥 Save Analytics for Next Time</div>
                          <p style={{ fontSize: "0.78rem", color: "#4b5563", margin: "0 0 0.75rem" }}>
                            Download this file and upload it as your Prior Analytics CSV next assessment. It carries each student's score history forward so growth and risk tracking continues.
                          </p>
                          <button
                            onClick={() => {
                              try {
                                const csv = growthData.buildAnalyticsCSV();
                                const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
                                const url = URL.createObjectURL(blob);
                                const a = document.createElement("a");
                                a.href = url;
                                a.download = (assessmentName || "Assessment") + "_Analytics.csv";
                                document.body.appendChild(a);
                                a.click();
                                document.body.removeChild(a);
                                URL.revokeObjectURL(url);
                              } catch(e) {
                                // Fallback: show in modal
                                setCsvContent(growthData.buildAnalyticsCSV());
                                setCsvModalOpen(true);
                              }
                            }}
                            style={{ background: "#1d4ed8", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.2rem", fontSize: "0.85rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", marginRight: "0.5rem" }}>
                            ⬇ Download Analytics CSV
                          </button>
                          <button
                            onClick={() => { setCsvContent(growthData.buildAnalyticsCSV()); setCsvModalOpen(true); }}
                            style={{ background: "white", color: "#1d4ed8", border: "1px solid #93c5fd", borderRadius: 8, padding: "0.5rem 1.2rem", fontSize: "0.85rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                            View / Copy CSV
                          </button>
                        </div>
                      )}

                    </div>
                  </div>
                );
              })()}
            </div>
          )}

          {/* ── CSV MODAL ── */}
          {csvModalOpen && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}
              onClick={() => setCsvModalOpen(false)}>
              <div style={{ background: "white", borderRadius: 12, padding: "1.5rem", width: "90%", maxWidth: 600, maxHeight: "80vh", display: "flex", flexDirection: "column", gap: "0.75rem" }}
                onClick={e => e.stopPropagation()}>
                <div style={{ fontWeight: 700, color: "#1e3a8a", fontSize: "0.95rem" }}>Analytics CSV — Copy &amp; save as .csv</div>
                <textarea readOnly value={csvContent} onClick={e => e.target.select()}
                  style={{ flex: 1, minHeight: 300, fontFamily: "monospace", fontSize: "0.75rem", border: "1px solid #e5e7eb", borderRadius: 6, padding: "0.5rem", resize: "none" }} />
                <div style={{ display: "flex", gap: "0.5rem" }}>
                  <button onClick={() => { navigator.clipboard?.writeText(csvContent); setCsvModalOpen(false); }}
                    style={{ background: "#1d4ed8", color: "white", border: "none", borderRadius: 7, padding: "0.4rem 1rem", fontFamily: "inherit", fontWeight: 600, cursor: "pointer", fontSize: "0.82rem" }}>
                    Copy to Clipboard &amp; Close
                  </button>
                  <button onClick={() => setCsvModalOpen(false)}
                    style={{ background: "#f3f4f6", color: "#374151", border: "none", borderRadius: 7, padding: "0.4rem 1rem", fontFamily: "inherit", fontWeight: 600, cursor: "pointer", fontSize: "0.82rem" }}>
                    Close
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
