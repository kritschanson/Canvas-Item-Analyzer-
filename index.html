                                                  <div style={{ fontSize: "0.7rem", fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: "0.3rem" }}>
                                                    {teacherLabel} · {names.length} student{names.length !== 1 ? "s" : ""}
                                                  </div>
                                                  <div style={{ display: "flex", flexWrap: "wrap", gap: "0.3rem" }}>
                                                    {[...names].sort().map(name => (
                                                      <span key={name} style={{ background: fs.bg, color: fs.color, borderRadius: 20, padding: "0.15rem 0.55rem", fontSize: "0.75rem", fontWeight: 500 }}>
                                                        {name}
                                                      </span>
                                                    ))}
                                                  </div>
                                                </div>
                                              ))}
                                            </div>
                                          )}
                                        </div>
                                      );
                                    })()}
                                  </div>
                                );
                              })}
                            </div>
                        }
                      </div>

                      {/* ── ITEMS FOR POTENTIAL REVIEW ── */}
                      {reviewItems.length > 0 && (
                        <div style={{ marginTop: "1.5rem" }}>
                          <h2 style={{ color: "#1e40af", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Playfair Display', serif" }}>🔎 Items for Potential Review</h2>
                          <p style={{ fontSize: "0.78rem", color: "#6b7280", margin: "0 0 0.75rem", lineHeight: 1.5 }}>
                            These items show low discrimination but high mastery (≥80% correct). This is likely a floor effect — nearly everyone got it right, leaving little room to differentiate. They may be intentionally easy, but are worth reviewing to confirm they're assessing the right level of complexity.
                          </p>
                          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.85rem" }}>
                            <thead>
                              <tr style={{ background: "#f8fafc" }}>
                                {["Item", "% Correct", "Difficulty", "Discrimination", "CITC", "Sample"].map(h => (
                                  <th key={h} style={{ padding: "0.45rem 0.75rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "2px solid #e5e7eb", fontSize: "0.78rem" }}>{h}</th>
                                ))}
                              </tr>
                            </thead>
                            <tbody>
                              {reviewItems.map((p, i) => (
                                <tr key={p.id} style={{ borderBottom: "1px solid #f3f4f6", background: i%2===0?"white":"#fafafa" }}>
                                  <td style={{ padding: "0.45rem 0.75rem" }}>
                                    <div style={{ fontFamily: "monospace", color: "#374151", fontSize: "0.78rem" }}>{p.id}</div>
                                    {p.title && <div style={{ fontSize: "0.75rem", color: p.title === "Untitled item" ? "#9ca3af" : "#4b5563", marginTop: "0.15rem", fontStyle: "italic" }}>{p.title}</div>}
                                  </td>
                                  <td style={{ padding: "0.45rem 0.75rem", fontWeight: 700, color: "#16a34a" }}>{p.finalPct}%</td>
                                  <td style={{ padding: "0.45rem 0.75rem", color: "#374151" }}>{p.combinedDiff.toFixed(2)}</td>
                                  <td style={{ padding: "0.45rem 0.75rem", color: "#6b7280" }}>{p.combinedDisc !== null ? p.combinedDisc.toFixed(2) : "N/A"}</td>
                                  <td style={{ padding: "0.45rem 0.75rem", color: "#6b7280" }}>{p.combinedCITC !== null ? p.combinedCITC.toFixed(2) : "N/A"}</td>
                                  <td style={{ padding: "0.45rem 0.75rem" }}>
                                    {p.smallSample
                                      ? <span style={{ background: "#fef9c3", color: "#92400e", borderRadius: 4, padding: "0.1rem 0.4rem", fontSize: "0.7rem", fontWeight: 700 }}>⚠️ {p.combinedN}</span>
                                      : <span style={{ color: "#6b7280" }}>{p.combinedN}</span>}
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      )}

                      {/* ── SUBGROUP PERFORMANCE ── */}
                      {growthData && Object.values(growthData.subgroupStats).some(sg => sg.large) && (
                        <div style={{ marginTop: "2rem" }}>
                          <h2 style={{ color: "#1e40af", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Playfair Display', serif" }}>👥 Subgroup Performance</h2>
                          <p style={{ fontSize: "0.78rem", color: "#6b7280", margin: "0 0 0.75rem", lineHeight: 1.5 }}>
                            Subgroups with more than 20 students compared to class average ({growthData.classAvg}%). Groups flagged ⚠️ are more than 10 points below the class average.
                          </p>
                          <div style={{ display: "flex", flexDirection: "column", gap: "0.6rem" }}>
                            {Object.values(growthData.subgroupStats).filter(sg => sg.large).sort((a,b) => a.gap - b.gap).map(sg => {
                              const gapColor = sg.flagged ? "#dc2626" : sg.gap >= 0 ? "#16a34a" : "#d97706";
                              const trendSymbol = sg.trend === "closing" ? "↑ Closing gap" : sg.trend === "widening" ? "↓ Widening gap" : sg.trend === "holding" ? "→ Holding steady" : null;
                              const trendColor = sg.trend === "closing" ? "#16a34a" : sg.trend === "widening" ? "#dc2626" : "#6b7280";
                              return (
                                <div key={sg.name} style={{ border: `1px solid ${sg.flagged ? "#fca5a5" : "#e0e7ff"}`, borderLeft: `4px solid ${gapColor}`, borderRadius: 8, padding: "0.75rem 1rem", background: sg.flagged ? "#fef2f2" : "white" }}>
                                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "0.5rem" }}>
                                    <div style={{ display: "flex", alignItems: "center", gap: "0.6rem" }}>
                                      <span style={{ fontWeight: 700, color: "#1e3a8a", fontSize: "0.9rem" }}>{sg.name}</span>
                                      <span style={{ fontSize: "0.72rem", color: "#6b7280" }}>n={sg.count}</span>
                                      {sg.flagged && <span style={{ background: "#fee2e2", color: "#dc2626", borderRadius: 4, padding: "0.1rem 0.45rem", fontSize: "0.68rem", fontWeight: 800 }}>⚠️ GAP</span>}
                                    </div>
                                    <div style={{ display: "flex", gap: "1rem", alignItems: "center", flexWrap: "wrap" }}>
                                      <span style={{ fontSize: "0.85rem" }}>Avg: <strong style={{ color: gapColor }}>{sg.avg}%</strong></span>
                                      <span style={{ fontSize: "0.85rem", color: gapColor, fontWeight: 700 }}>{sg.gap >= 0 ? "+" : ""}{sg.gap} pts vs class</span>
                                      {trendSymbol && <span style={{ fontSize: "0.78rem", color: trendColor, fontWeight: 600 }}>{trendSymbol}</span>}
                                    </div>
                                  </div>
                                  <div style={{ marginTop: "0.4rem" }}>
                                    <div style={{ height: 6, background: "#e5e7eb", borderRadius: 3, overflow: "hidden", position: "relative" }}>
                                      <div style={{ position: "absolute", left: Math.max(0, Math.min(growthData.classAvg, 100)) + "%", top: 0, bottom: 0, width: 2, background: "#9ca3af" }} />
                                      <div style={{ width: sg.avg + "%", height: "100%", background: gapColor, borderRadius: 3 }} />
                                    </div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )}

                      {/* ── STUDENT GROWTH & RISK TRACKING ── */}
                      {growthData && (() => {
                        const hasPrior = priorMap && Object.keys(priorMap).length > 0;
                        const riskOrder = { "PERSISTENTLY_AT_RISK": 0, "AT_RISK": 1, "RECOVERING": 2, "OK": 3 };
                        // Group by teacher, then sort within each group
                        const byTeacher = {};
                        growthData.enriched.forEach(s => {
                          const t = s.teacherLabel || "Unknown";
                          if (!byTeacher[t]) byTeacher[t] = [];
                          byTeacher[t].push(s);
                        });
                        Object.keys(byTeacher).forEach(t => {
                          byTeacher[t].sort((a, b) => (riskOrder[a.riskStatus] ?? 3) - (riskOrder[b.riskStatus] ?? 3) || a.name.localeCompare(b.name));
                        });
                        const teacherKeys = Object.keys(byTeacher).sort();
                        const anyFlagged = growthData.enriched.some(s => s.riskStatus !== "OK");

                        return (
                          <div style={{ marginTop: "2rem" }}>
                            <h2 style={{ color: "#1e40af", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Playfair Display', serif" }}>📈 Student Growth &amp; Risk Tracking</h2>
                            {!hasPrior ? (
                              <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 8, padding: "0.7rem 1rem", fontSize: "0.82rem", color: "#92400e" }}>
                                <strong>First assessment — no prior data loaded.</strong> Current proficiency is shown below. Risk tracking (At Risk / Persistently At Risk flags) will begin once a prior Analytics CSV is uploaded next time.
                              </div>
                            ) : (
                              <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", marginBottom: "0.75rem", fontSize: "0.72rem" }}>
                                {[["PERSISTENTLY_AT_RISK","#dc2626","#fee2e2","Persistently At Risk"],["AT_RISK","#d97706","#fef9c3","At Risk"],["RECOVERING","#7c3aed","#f5f3ff","Recovering"]].map(([k,c,bg,lbl]) => (
                                  <span key={k} style={{ background: bg, color: c, borderRadius: 4, padding: "0.15rem 0.5rem", fontWeight: 700 }}>{lbl}</span>
                                ))}
                              </div>
                            )}
                            {teacherKeys.map(teacherKey => {
                              const allStudents = byTeacher[teacherKey];
                              const students = allStudents.filter(s => s.riskStatus !== "OK");
                              return (
                                <div key={teacherKey} style={{ marginBottom: "1.25rem" }}>
                                  <div style={{ fontSize: "0.72rem", fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: "0.06em", padding: "0.4rem 0", borderBottom: "1px solid #e5e7eb", marginBottom: "0.5rem" }}>
                                    {teacherKey} · {students.length} flagged of {allStudents.length} students
                                  </div>
                                  {students.length === 0
                                    ? <p style={{ fontSize: "0.82rem", color: "#16a34a", fontWeight: 600, margin: "0.25rem 0" }}>✓ All students proficient — no flags this assessment.</p>
                                    : <div style={{ display: "flex", flexDirection: "column", gap: "0.4rem" }}>
                                    {students.map(s => {
                                      const riskColors = {
                                        "PERSISTENTLY_AT_RISK": { bg: "#fee2e2", border: "#fca5a5", badge: "#dc2626", badgeBg: "#fee2e2", label: "Persistently At Risk" },
                                        "AT_RISK": { bg: "#fef9c3", border: "#fde68a", badge: "#d97706", badgeBg: "#fef9c3", label: "At Risk" },
                                        "RECOVERING": { bg: "#f5f3ff", border: "#ddd6fe", badge: "#7c3aed", badgeBg: "#f5f3ff", label: "Recovering" },
                                        "OK": { bg: "white", border: "#e0e7ff", badge: "#16a34a", badgeBg: "#dcfce7", label: "Proficient" },
                                      };
                                      const rc = riskColors[s.riskStatus] || riskColors["OK"];
                                      return (
                                        <div key={s.name} style={{ border: `1px solid ${rc.border}`, borderLeft: `3px solid ${rc.badge}`, borderRadius: 7, padding: "0.6rem 0.85rem", background: rc.bg, display: "flex", alignItems: "center", flexWrap: "wrap", gap: "0.5rem" }}>
                                          <span style={{ fontWeight: 600, color: "#1e3a8a", fontSize: "0.85rem", flex: "1 1 120px" }}>{s.name}</span>
                                          <span style={{ background: rc.badgeBg, color: rc.badge, borderRadius: 4, padding: "0.1rem 0.45rem", fontSize: "0.68rem", fontWeight: 800 }}>{rc.label}</span>
                                          {s.subgroups.length > 0 && <span style={{ fontSize: "0.7rem", color: "#6b7280" }}>{s.subgroups.join(", ")}</span>}
                                          <div style={{ display: "flex", gap: "0.25rem", flexWrap: "wrap", alignItems: "center" }}>
                                            {s.history.map((h, i) => {
                                              const hReassess = (s.reassessedAssessments || []).find(r => r.assessment === h.assessment);
                                              return (
                                                <span key={i}
                                                  title={h.assessment + (hReassess ? ` (reassessed from ${hReassess.originalPct}%)` : "")}
                                                  style={{ background: h.score >= 70 ? "#dcfce7" : "#fee2e2", color: h.score >= 70 ? "#16a34a" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.35rem", fontSize: "0.68rem", fontWeight: 700, display: "inline-flex", alignItems: "center", gap: "0.15rem" }}>
                                                  {hReassess && <span style={{ color: hReassess.originalPct >= 70 ? "#16a34a" : "#dc2626", opacity: 0.65, textDecoration: "line-through", fontSize: "0.62rem" }}>{hReassess.originalPct}%</span>}
                                                  {hReassess && <span style={{ opacity: 0.5, fontSize: "0.6rem" }}>↑</span>}
                                                  {h.score}%
                                                </span>
                                              );
                                            })}
                                            {s.history.length > 0 && <span style={{ color: "#9ca3af", fontSize: "0.65rem" }}>→</span>}
                                            {(() => {
                                              const curReassess = (s.reassessedAssessments || []).find(r => r.assessment === (assessmentName || "Current"));
                                              return (
                                                <span style={{ background: s.proficient ? "#dcfce7" : "#fee2e2", color: s.proficient ? "#16a34a" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.35rem", fontSize: "0.68rem", fontWeight: 800, outline: "2px solid currentColor", outlineOffset: 1, display: "inline-flex", alignItems: "center", gap: "0.15rem" }}>
                                                  {curReassess && <span style={{ color: curReassess.originalPct >= 70 ? "#16a34a" : "#dc2626", opacity: 0.65, textDecoration: "line-through", fontSize: "0.62rem" }}>{curReassess.originalPct}%</span>}
                                                  {curReassess && <span style={{ opacity: 0.5, fontSize: "0.6rem" }}>↑</span>}
                                                  {s.pct}%
                                                </span>
                                              );
                                            })()}
                                          </div>
                                        </div>
                                      );
                                    })}
                                  </div>
                                  }
                                </div>
                              );
                            })}
                          </div>
                        );
                      })()}

                      {/* ── SMALL SUBGROUP SPOTLIGHT ── */}
                      {growthData && Object.values(growthData.subgroupStats).some(sg => !sg.large) && (() => {
                        const smallSubgroups = Object.values(growthData.subgroupStats).filter(sg => !sg.large);
                        const riskOrder = { "PERSISTENTLY_AT_RISK": 0, "AT_RISK": 1, "RECOVERING": 2, "OK": 3 };
                        const riskLabels = {
                          "PERSISTENTLY_AT_RISK": { label: "Persistently At Risk", color: "#dc2626", bg: "#fee2e2" },
                          "AT_RISK":              { label: "At Risk",              color: "#d97706", bg: "#fef9c3" },
                          "RECOVERING":           { label: "Recovering",           color: "#7c3aed", bg: "#f5f3ff" },
                          "OK":                   { label: "Proficient",           color: "#16a34a", bg: "#dcfce7" },
                        };
                        // Get sorted teacher keys
                        const teacherKeys = [...new Set(growthData.enriched.map(s => s.teacherLabel))].sort();
                        return (
                          <div style={{ marginTop: "2rem" }}>
                            <h2 style={{ color: "#1e40af", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Playfair Display', serif" }}>🔦 Small Subgroup Spotlight</h2>
                            <p style={{ fontSize: "0.78rem", color: "#6b7280", margin: "0 0 0.75rem", lineHeight: 1.5 }}>
                              These subgroups have 20 or fewer students — too small for reliable group comparisons. Each student is listed individually. The focus here is growth conversation: what is working for students who are thriving, and what interventions or shared materials might support those who are not?
                            </p>
                            {smallSubgroups.map(sg => {
                              // Build all rows across all teachers for this subgroup
                              const allRows = [];
                              teacherKeys.forEach(teacherKey => {
                                const members = growthData.enriched.filter(s => s.teacherLabel === teacherKey && s.subgroups.includes(sg.name));
                                if (members.length === 0) return;
                                const sorted = [...members].sort((a, b) => (riskOrder[a.riskStatus] ?? 3) - (riskOrder[b.riskStatus] ?? 3) || a.name.localeCompare(b.name));
                                sorted.forEach((s, i) => allRows.push({ ...s, teacherKey, firstInTeacher: i === 0, teacherCount: sorted.length }));
                              });
                              if (allRows.length === 0) return null;
                              const hasPrior = allRows.some(s => s.history.length > 0);
                              const avgPct = Math.round(allRows.reduce((a, s) => a + s.pct, 0) / allRows.length);
                              return (
                                <div key={sg.name} style={{ background: "white", border: "1px solid #e0e7ff", borderRadius: 10, overflow: "hidden", marginBottom: "1rem" }}>
                                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0.6rem 0.85rem", background: "#f0f4ff", borderBottom: "1px solid #e0e7ff" }}>
                                    <span style={{ fontWeight: 700, color: "#1e3a8a", fontSize: "0.88rem" }}>{sg.name} <span style={{ fontWeight: 400, color: "#6b7280", fontSize: "0.75rem" }}>· {allRows.length} student{allRows.length !== 1 ? "s" : ""}</span></span>
                                    <span style={{ fontSize: "0.75rem", color: "#6b7280", fontWeight: 600 }}>Avg: {avgPct}%</span>
                                  </div>
                                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.82rem" }}>
                                    <thead>
                                      <tr style={{ background: "#f8fafc" }}>
                                        <th style={{ padding: "0.4rem 0.75rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "1px solid #e5e7eb", fontSize: "0.72rem", width: "12%" }}>Teacher</th>
                                        <th style={{ padding: "0.4rem 0.75rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "1px solid #e5e7eb", fontSize: "0.72rem" }}>Student</th>
                                        <th style={{ padding: "0.4rem 0.75rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "1px solid #e5e7eb", fontSize: "0.72rem" }}>Status</th>
                                        <th style={{ padding: "0.4rem 0.75rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "1px solid #e5e7eb", fontSize: "0.72rem" }}>{hasPrior ? "Score History → Current" : "Current Score"}</th>
                                      </tr>
                                    </thead>
                                    <tbody>
                                      {allRows.map((s, i) => {
                                        const rl = riskLabels[s.riskStatus] || riskLabels["OK"];
                                        return (
                                          <tr key={s.name} style={{ borderBottom: "1px solid #f3f4f6", background: i % 2 === 0 ? "white" : "#fafafa" }}>
                                            <td style={{ padding: "0.45rem 0.75rem", fontWeight: 700, color: "#1e3a8a", fontSize: "0.78rem", verticalAlign: "middle", borderRight: "2px solid #e0e7ff", background: "#f8fafc" }}>
                                              {s.firstInTeacher ? s.teacherKey : ""}
                                            </td>
                                            <td style={{ padding: "0.45rem 0.75rem", fontWeight: 600, color: "#374151" }}>{s.name}</td>
                                            <td style={{ padding: "0.45rem 0.75rem" }}>
                                              <span style={{ background: rl.bg, color: rl.color, borderRadius: 4, padding: "0.15rem 0.5rem", fontSize: "0.68rem", fontWeight: 800, whiteSpace: "nowrap" }}>{rl.label}</span>
                                            </td>
                                            <td style={{ padding: "0.45rem 0.75rem" }}>
                                              <div style={{ display: "flex", alignItems: "center", gap: "0.25rem", flexWrap: "wrap" }}>
                                                {s.history.map((h, hi) => (
                                                  (() => {
                                                    const hReassess = (s.reassessedAssessments || []).find(r => r.assessment === h.assessment);
                                                    return (
                                                      <span key={hi}
                                                        title={h.assessment + (hReassess ? ` (reassessed from ${hReassess.originalPct}%)` : "")}
                                                        style={{ background: h.score >= 70 ? "#dcfce7" : "#fee2e2", color: h.score >= 70 ? "#16a34a" : "#dc2626", borderRadius: 3, padding: "0.15rem 0.4rem", fontSize: "0.68rem", fontWeight: 700, display: "inline-flex", alignItems: "center", gap: "0.15rem" }}>
                                                        {hReassess && <span style={{ color: hReassess.originalPct >= 70 ? "#16a34a" : "#dc2626", opacity: 0.65, textDecoration: "line-through", fontSize: "0.6rem" }}>{hReassess.originalPct}%</span>}
                                                        {hReassess && <span style={{ opacity: 0.5, fontSize: "0.58rem" }}>↑</span>}
                                                        {h.score}%
                                                      </span>
                                                    );
                                                  })()
                                                ))}
                                                {s.history.length > 0 && <span style={{ color: "#9ca3af", fontSize: "0.65rem" }}>→</span>}
                                                {(() => {
                                                  const curReassess = (s.reassessedAssessments || []).find(r => r.assessment === (assessmentName || "Current"));
                                                  return (
                                                    <span style={{ background: s.proficient ? "#dcfce7" : "#fee2e2", color: s.proficient ? "#16a34a" : "#dc2626", borderRadius: 3, padding: "0.15rem 0.4rem", fontSize: "0.68rem", fontWeight: 800, outline: "2px solid currentColor", outlineOffset: 1, display: "inline-flex", alignItems: "center", gap: "0.15rem" }}>
                                                      {curReassess && <span style={{ color: curReassess.originalPct >= 70 ? "#16a34a" : "#dc2626", opacity: 0.65, textDecoration: "line-through", fontSize: "0.6rem" }}>{curReassess.originalPct}%</span>}
                                                      {curReassess && <span style={{ opacity: 0.5, fontSize: "0.58rem" }}>↑</span>}
                                                      {s.pct}%
                                                    </span>
                                                  );
                                                })()}
                                              </div>
                                            </td>
                                          </tr>
                                        );
                                      })}
                                    </tbody>
                                  </table>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })()}

                      {/* ── REASSESSMENT TRACKER ── */}
                      {growthData && growthData.reassessments && growthData.reassessments.length > 0 && (() => {
                        const allReassessed = growthData.reassessments;
                        // Sort by highest original score descending (already-proficient at top)
                        const sorted = [...allReassessed].sort((a, b) => {
                          const aMax = Math.max(...a.reassessedAssessments.map(r => r.originalPct));
                          const bMax = Math.max(...b.reassessedAssessments.map(r => r.originalPct));
                          return bMax - aMax;
                        });
                        const totalInstances = allReassessed.flatMap(s => s.reassessedAssessments).length;
                        const crossedProf = allReassessed.flatMap(s => s.reassessedAssessments).filter(r => r.crossedProficiency).length;
                        const alreadyProf = allReassessed.flatMap(s => s.reassessedAssessments).filter(r => r.originalPct >= 70).length;
                        const stillBelow = allReassessed.flatMap(s => s.reassessedAssessments).filter(r => !r.crossedProficiency && r.originalPct < 70).length;
                        // Repeat reassessors: students with reassessments on multiple assessments (current + history)
                        const repeatReassessors = allReassessed.filter(s => {
                          const priorReassessCount = s.history.filter(h => h.originalScore !== null && h.originalScore !== undefined).length;
                          return s.reassessedAssessments.length > 1 || priorReassessCount > 0;
                        }).length;
                        return (
                          <div style={{ marginTop: "2rem" }}>
                            <h2 style={{ color: "#1e40af", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Playfair Display', serif" }}>↻ Reassessment Tracker</h2>
                            <p style={{ fontSize: "0.78rem", color: "#6b7280", margin: "0 0 0.75rem", lineHeight: 1.5 }}>
                              Students whose scores increased from the original assessment. Scores can only go up — any increase indicates a reassessment was recorded in Canvas.
                            </p>
                            {/* Summary chips */}
                            {(() => {
                              const chips = [
                                [`${allReassessed.length} student${allReassessed.length !== 1 ? "s" : ""} reassessed`, "#1e40af", "#dbeafe"],
                                [`${crossedProf} crossed proficiency`, "#16a34a", "#dcfce7"],
                                [`${alreadyProf} already proficient`, "#d97706", "#fef9c3"],
                                [`${stillBelow} still below proficiency`, "#dc2626", "#fee2e2"],
                              ];
                              if (repeatReassessors > 0) chips.push([`${repeatReassessors} repeat reassessor${repeatReassessors !== 1 ? "s" : ""}`, "#7c3aed", "#f5f3ff"]);
                              return (
                                <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", marginBottom: "1rem" }}>
                                  {chips.map(([label, color, bg]) => (
                                    <span key={label} style={{ background: bg, color, borderRadius: 20, padding: "0.25rem 0.75rem", fontSize: "0.75rem", fontWeight: 700 }}>{label}</span>
                                  ))}
                                </div>
                              );
                            })()}
                            {/* Table */}
                            <div style={{ background: "white", border: "1px solid #e0e7ff", borderRadius: 10, overflow: "hidden" }}>
                              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.82rem" }}>
                                <thead>
                                  <tr style={{ background: "#f8fafc" }}>
                                    {["Student", "Teacher", "Assessment", "Original", "Reassessed", "Outcome"].map(h => (
                                      <th key={h} style={{ padding: "0.5rem 0.75rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "1px solid #e5e7eb", fontSize: "0.72rem" }}>{h}</th>
                                    ))}
                                  </tr>
                                </thead>
                                <tbody>
                                  {sorted.flatMap((s, si) => {
                                    const isRepeat = s.history.filter(h => h.originalScore !== null && h.originalScore !== undefined).length > 0 || s.reassessedAssessments.length > 1;
                                    return s.reassessedAssessments.map((r, ri) => {
                                      const outcomeBg = r.crossedProficiency ? "#dcfce7" : r.originalPct >= 70 ? "#fef9c3" : "#fee2e2";
                                      const outcomeColor = r.crossedProficiency ? "#16a34a" : r.originalPct >= 70 ? "#d97706" : "#dc2626";
                                      const outcomeLabel = r.crossedProficiency ? "Not Prof → Proficient" : r.originalPct >= 70 ? "Already Proficient" : "Still Not Proficient";
                                      const rowBg = (si + ri) % 2 === 0 ? "white" : "#fafafa";
                                      return (
                                        <tr key={`${s.name}-${ri}`} style={{ borderBottom: "1px solid #f3f4f6", background: rowBg }}>
                                          <td style={{ padding: "0.45rem 0.75rem", fontWeight: 600, color: "#1e3a8a" }}>
                                            {ri === 0 ? (
                                              <span style={{ display: "flex", alignItems: "center", gap: "0.35rem" }}>
                                                {s.name}
                                                {isRepeat && <span style={{ background: "#f5f3ff", color: "#7c3aed", borderRadius: 4, padding: "0.1rem 0.35rem", fontSize: "0.62rem", fontWeight: 800 }}>↻ repeat</span>}
                                              </span>
                                            ) : ""}
                                          </td>
                                          <td style={{ padding: "0.45rem 0.75rem", fontSize: "0.78rem", color: "#6b7280" }}>{ri === 0 ? s.teacherLabel : ""}</td>
                                          <td style={{ padding: "0.45rem 0.75rem", color: "#374151" }}>{r.assessment}</td>
                                          <td style={{ padding: "0.45rem 0.75rem", fontWeight: 700, color: "#dc2626" }}>{r.originalPct}%</td>
                                          <td style={{ padding: "0.45rem 0.75rem", fontWeight: 700, color: "#16a34a" }}>{r.newPct}%</td>
                                          <td style={{ padding: "0.45rem 0.75rem" }}>
                                            <span style={{ background: outcomeBg, color: outcomeColor, borderRadius: 4, padding: "0.15rem 0.5rem", fontSize: "0.68rem", fontWeight: 800, whiteSpace: "nowrap" }}>{outcomeLabel}</span>
                                          </td>
                                        </tr>
                                      );
                                    });
                                  })}
                                </tbody>
                              </table>
                            </div>
                          </div>
                        );
                      })()}

                      {/* ── SNAPSHOT EXPORT ── */}
                      {!isSnapshot && (
                        <div style={{ marginTop: "2rem", background: "#f0f4ff", border: "1px solid #c7d2fe", borderRadius: 10, padding: "1rem 1.25rem" }}>
                          <div style={{ fontWeight: 700, color: "#1e3a8a", fontSize: "0.9rem", marginBottom: "0.35rem" }}>📸 Save Interactive Snapshot</div>
                          <p style={{ fontSize: "0.78rem", color: "#4b5563", margin: "0 0 0.75rem" }}>
                            Downloads a self-contained HTML file with all data embedded. Open in any browser — the full report is interactive with all sections working. Share with admin or save to your team drive for the next PLC meeting.
                          </p>
                          <button
                            onClick={downloadSnapshot}
                            style={{ background: "#1e40af", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.2rem", fontSize: "0.85rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                            📸 Download Snapshot
                          </button>
                        </div>
                      )}

                                            {/* ── ANALYTICS CSV EXPORT ── */}
                      {growthData && (
                        <div style={{ marginTop: "2rem", background: "#f0f4ff", border: "1px solid #c7d2fe", borderRadius: 10, padding: "1rem 1.25rem" }}>
                          <div style={{ fontWeight: 700, color: "#1e3a8a", fontSize: "0.9rem", marginBottom: "0.35rem" }}>📥 Save Analytics for Next Time</div>
                          <p style={{ fontSize: "0.78rem", color: "#4b5563", margin: "0 0 0.75rem" }}>
                            Download this file and upload it as your Prior Analytics CSV next assessment. It carries each student's score history forward so growth and risk tracking continues.
                          </p>
                          <button
                            onClick={() => {
                              try {
                                const csv = growthData.buildAnalyticsCSV();
                                const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
                                const url = URL.createObjectURL(blob);
                                const a = document.createElement("a");
                                a.href = url;
                                a.download = (assessmentName || "Assessment") + "_Analytics.csv";
                                document.body.appendChild(a);
                                a.click();
                                document.body.removeChild(a);
                                URL.revokeObjectURL(url);
                              } catch(e) {
                                // Fallback: show in modal
                                setCsvContent(growthData.buildAnalyticsCSV());
                                setCsvModalOpen(true);
                              }
                            }}
                            style={{ background: "#1d4ed8", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.2rem", fontSize: "0.85rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", marginRight: "0.5rem" }}>
                            ⬇ Download Analytics CSV
                          </button>
                          <button
                            onClick={() => { setCsvContent(growthData.buildAnalyticsCSV()); setCsvModalOpen(true); }}
                            style={{ background: "white", color: "#1d4ed8", border: "1px solid #93c5fd", borderRadius: 8, padding: "0.5rem 1.2rem", fontSize: "0.85rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                            View / Copy CSV
                          </button>
                        </div>
                      )}

                    </div>
                  </div>
                );
              })()}
            </div>
          )}

          {/* ── CSV MODAL ── */}
          {csvModalOpen && (
            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}
              onClick={() => setCsvModalOpen(false)}>
              <div style={{ background: "white", borderRadius: 12, padding: "1.5rem", width: "90%", maxWidth: 600, maxHeight: "80vh", display: "flex", flexDirection: "column", gap: "0.75rem" }}
                onClick={e => e.stopPropagation()}>
                <div style={{ fontWeight: 700, color: "#1e3a8a", fontSize: "0.95rem" }}>Analytics CSV — Copy &amp; save as .csv</div>
                <textarea readOnly value={csvContent} onClick={e => e.target.select()}
                  style={{ flex: 1, minHeight: 300, fontFamily: "monospace", fontSize: "0.75rem", border: "1px solid #e5e7eb", borderRadius: 6, padding: "0.5rem", resize: "none" }} />
                <div style={{ display: "flex", gap: "0.5rem" }}>
                  <button onClick={() => { navigator.clipboard?.writeText(csvContent); setCsvModalOpen(false); }}
                    style={{ background: "#1d4ed8", color: "white", border: "none", borderRadius: 7, padding: "0.4rem 1rem", fontFamily: "inherit", fontWeight: 600, cursor: "pointer", fontSize: "0.82rem" }}>
                    Copy to Clipboard &amp; Close
                  </button>
                  <button onClick={() => setCsvModalOpen(false)}
                    style={{ background: "#f3f4f6", color: "#374151", border: "none", borderRadius: 7, padding: "0.4rem 1rem", fontFamily: "inherit", fontWeight: 600, cursor: "pointer", fontSize: "0.82rem" }}>
                    Close
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
