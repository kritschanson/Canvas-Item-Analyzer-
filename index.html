<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas PLC Item Analyzer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>*, *::before, *::after { box-sizing: border-box; } body { margin: 0; padding: 0; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback } = React;

// ─── CSV Parsing ────────────────────────────────────────────────────────────

function parseCSVFull(text) {
  // Use a proper state-machine parser that respects quoted newlines
  const rows = [];
  let cur = [], cell = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQ && text[i + 1] === '"') { cell += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      cur.push(cell); cell = "";
    } else if ((ch === '\n' || ch === '\r') && !inQ) {
      if (ch === '\r' && text[i + 1] === '\n') i++;
      cur.push(cell); cell = "";
      if (cur.some(c => c.trim())) rows.push(cur);
      cur = [];
    } else {
      cell += ch;
    }
  }
  if (cell || cur.length) { cur.push(cell); if (cur.some(c => c.trim())) rows.push(cur); }
  return rows;
}

// Detect file type from headers
function detectFileType(rows) {
  if (!rows.length) return null;
  const h = rows[0];
  if (h.includes("OverallScore")) return "student";
  if (h.includes("ItemDifficulty")) return "item";
  return null;
}

// Parse Canvas item analysis CSV
function parseItemCSV(rows, label) {
  const headers = rows[0];
  const toObj = row => { const o = {}; headers.forEach((h, i) => o[h] = row[i] ?? ""); return o; };
  const allRows = rows.slice(1).map(toObj);
  const summary = allRows[0];
  const items = allRows.filter(r => r.ItemID && r.ItemID.trim());
  return { type: "item", label, summary, items };
}

// Parse Canvas student analysis CSV
function parseStudentCSV(rows, label) {
  const headers = rows[0];
  // Item groups start at col 7, each group is 5 cols wide, last 5 cols are summary
  const itemGroups = [];
  let col = 7;
  while (col < headers.length - 5) {
    itemGroups.push({ col, itemId: null, question: (headers[col + 2] || "").replace(/\s+/g, " ").trim().slice(0, 80) });
    col += 5;
  }

  const students = rows.slice(1).map(row => {
    if (row.length < headers.length - 2) return null;
    const items = itemGroups.map(g => {
      const c = g.col;
      const earned = parseFloat(row[c + 3]);
      return {
        itemId: row[c] || "",
        answer: (row[c + 2] || "").replace(/<[^>]+>/g, "").trim(),
        earned: isNaN(earned) ? null : earned,
        status: row[c + 4] || ""
      };
    });
    const overall = parseFloat(row[row.length - 1]);
    const possible = parseFloat(row[row.length - 2]);
    return {
      name: row[0],
      section: row[3],
      correct: parseInt(row[row.length - 5]) || 0,
      incorrect: parseInt(row[row.length - 4]) || 0,
      noResponse: parseInt(row[row.length - 3]) || 0,
      overall: isNaN(overall) ? 0 : overall,
      possible: isNaN(possible) ? 0 : possible,
      pct: (!isNaN(overall) && !isNaN(possible) && possible > 0) ? Math.round((overall / possible) * 100) : 0,
      items
    };
  }).filter(Boolean);

  // Build per-item stats from student data
  const itemStats = itemGroups.map((g, idx) => {
    const attempted = students.filter(s => s.items[idx]?.status !== "Not Attempted");
    const correct = students.filter(s => s.items[idx]?.earned > 0);
    // Tally wrong answers
    const wrongTally = {};
    students.forEach(s => {
      const it = s.items[idx];
      if (it && it.status !== "Not Attempted" && it.earned === 0 && it.answer) {
        const ans = it.answer.trim();
        if (ans) wrongTally[ans] = (wrongTally[ans] || 0) + 1;
      }
    });
    const topWrong = Object.entries(wrongTally).sort((a, b) => b[1] - a[1])[0] || null;
    return {
      itemId: students[0]?.items[idx]?.itemId || "",
      totalStudents: students.length,
      attempted: attempted.length,
      correct: correct.length,
      pct: attempted.length > 0 ? Math.round((correct.length / attempted.length) * 100) : 0,
      topWrongAnswer: topWrong ? topWrong[0] : null,
      topWrongCount: topWrong ? topWrong[1] : 0,
      wrongTally
    };
  });

  // Score calculations
  const scores = students.map(s => s.pct);
  const mean = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : 0;
  const sorted = [...scores].sort((a, b) => a - b);
  const median = sorted.length ? sorted[Math.floor(sorted.length / 2)] : 0;
  const high = scores.length ? Math.max(...scores) : 0;
  const low = scores.length ? Math.min(...scores) : 0;

  // Grade distribution
  const gradeDist = {
    A: students.filter(s => s.pct >= 90).length,
    B: students.filter(s => s.pct >= 80 && s.pct < 90).length,
    C: students.filter(s => s.pct >= 70 && s.pct < 80).length,
    D: students.filter(s => s.pct >= 60 && s.pct < 70).length,
    F: students.filter(s => s.pct < 60).length,
  };

  // Proficiency: 70%+
  const proficient = students.filter(s => s.pct >= 70).length;
  const notProficient = students.filter(s => s.pct < 70).length;
  const proficiencyPct = students.length > 0 ? Math.round((proficient / students.length) * 100) : 0;

  return { type: "student", label, students, itemStats, mean, median, high, low, gradeDist, proficient, notProficient, proficiencyPct };
}

// ─── Classifiers ────────────────────────────────────────────────────────────

function classifyDifficulty(d) {
  const v = parseFloat(d);
  if (isNaN(v)) return { label: "N/A", color: "#9ca3af" };
  if (v >= 0.8) return { label: "Easy", color: "#16a34a" };
  if (v >= 0.5) return { label: "Moderate", color: "#d97706" };
  return { label: "Difficult", color: "#dc2626" };
}

function classifyDiscrimination(d) {
  const v = parseFloat(d);
  if (isNaN(v)) return { label: "N/A", color: "#9ca3af" };
  if (v >= 0.4) return { label: "Excellent", color: "#16a34a" };
  if (v >= 0.2) return { label: "Good", color: "#65a30d" };
  if (v >= 0.0) return { label: "Fair", color: "#d97706" };
  return { label: "Poor", color: "#dc2626" };
}

// ─── Report Builder (no API needed) ────────────────────────────────────────

function buildReport(teachers) {
  // ── Pre-aggregate everything before sending to AI ──────────────────────────

  // 1. Overall quiz stats (from item analysis summaries)
  const itemSummaries = teachers.filter(t => t.item).map(t => t.item.summary);
  const means = itemSummaries.map(s => parseFloat(s.QuizMeanScore)).filter(v => !isNaN(v));
  const medians = itemSummaries.map(s => parseFloat(s.QuizMedianScore)).filter(v => !isNaN(v));
  const highs = itemSummaries.map(s => parseFloat(s.QuizHighScore)).filter(v => !isNaN(v));
  const lows = itemSummaries.map(s => parseFloat(s.QuizLowScore)).filter(v => !isNaN(v));
  const overallMean = means.length ? (means.reduce((a,b)=>a+b,0)/means.length).toFixed(1) : "N/A";
  const overallMedian = medians.length ? (medians.reduce((a,b)=>a+b,0)/medians.length).toFixed(1) : "N/A";
  const overallHigh = highs.length ? Math.max(...highs).toFixed(1) : "N/A";
  const overallLow = lows.length ? Math.min(...lows).toFixed(1) : "N/A";

  // 2. Aggregate item stats across all item analysis files
  // itemId -> { correct, total, difficulties[], discriminations[], topDistractor, topDistractorCount }
  const itemAgg = {};
  teachers.filter(t => t.item).forEach(t => {
    t.item.items.forEach(itm => {
      const id = itm.ItemID;
      if (!id) return;
      const correct = parseInt(itm.Correct) || 0;
      const incorrect = parseInt(itm.Incorrect) || 0;
      const total = correct + incorrect;
      const diff = parseFloat(itm.ItemDifficulty);
      const disc = parseFloat(itm.DiscriminationIndex);
      if (!itemAgg[id]) itemAgg[id] = { correct:0, total:0, difficulties:[], discriminations:[], topDistractor:"", topDistractorCount:0 };
      itemAgg[id].correct += correct;
      itemAgg[id].total += total;
      if (!isNaN(diff)) itemAgg[id].difficulties.push(diff);
      if (!isNaN(disc)) itemAgg[id].discriminations.push(disc);
      // Take distractor from item analysis AnswerFrequencies
      try {
        const af = JSON.parse(itm.AnswerFrequencies);
        (af.blanks || []).forEach(b => {
          const wrong = (b.answers || []).filter(a => !a.correct && a.count > 0).sort((a,b) => b.count - a.count);
          if (wrong.length && wrong[0].count > itemAgg[id].topDistractorCount) {
            itemAgg[id].topDistractor = wrong[0].answer;
            itemAgg[id].topDistractorCount = wrong[0].count;
          }
        });
      } catch(_) {}
    });
  });

  // 3. Aggregate wrong answers from student analysis files (more accurate than item analysis)
  // itemId -> { attempted, correct, wrongTally{}, studentsWrong[] }
  const studentAgg = {};
  teachers.filter(t => t.student).forEach(t => {
    t.student.itemStats.forEach(s => {
      const id = s.itemId;
      if (!id) return;
      if (!studentAgg[id]) studentAgg[id] = { attempted:0, correct:0, wrongTally:{}, studentsWrong:[] };
      studentAgg[id].attempted += s.attempted;
      studentAgg[id].correct += s.correct;
      // Merge the full wrongTally from each section
      Object.entries(s.wrongTally || {}).forEach(([ans, cnt]) => {
        studentAgg[id].wrongTally[ans] = (studentAgg[id].wrongTally[ans] || 0) + cnt;
      });
    });
    // Track which students got each item wrong
    t.student.students.forEach(stu => {
      t.student.itemStats.forEach(s => {
        const id = s.itemId;
        if (!id || !studentAgg[id]) return;
        const idx = t.student.itemStats.indexOf(s);
        const it = stu.items[idx];
        if (it && it.status !== "Not Attempted" && it.earned === 0) {
          studentAgg[id].studentsWrong.push(stu.name);
        }
      });
    });
  });

  // 4. Student proficiency aggregated
  const allStudentData = teachers.filter(t => t.student).map(t => t.student);
  const totalStudents = allStudentData.reduce((a,s) => a + s.students.length, 0);
  const totalProficient = allStudentData.reduce((a,s) => a + s.proficient, 0);
  const proficiencyPct = totalStudents > 0 ? Math.round((totalProficient/totalStudents)*100) : 0;
  const gradeDist = { A:0, B:0, C:0, D:0, F:0 };
  allStudentData.forEach(s => { Object.keys(gradeDist).forEach(g => gradeDist[g] += s.gradeDist[g]); });

  // ── Build prompt text ───────────────────────────────────────────────────────

  // Overall stats block
  let statsBlock = `COMBINED QUIZ STATS (${teachers.filter(t=>t.item).length} sections):\n`;
  statsBlock += `Mean: ${overallMean}% | Median: ${overallMedian}% | High: ${overallHigh}% | Low: ${overallLow}%\n`;
  if (totalStudents > 0) {
    statsBlock += `Students: ${totalStudents} total | Proficient (>=70%): ${totalProficient} (${proficiencyPct}%) | Not proficient: ${totalStudents - totalProficient}\n`;
    statsBlock += `Grade distribution: A(90%+): ${gradeDist.A} | B(80-89%): ${gradeDist.B} | C(70-79%): ${gradeDist.C} | D(60-69%): ${gradeDist.D} | F(<60%): ${gradeDist.F}\n`;
  }

  // ── Pre-compute strength and priority lists ─────────────────────────────────

  // Strength: items where ALL difficulty values are >= 0.80
  // Use studentAgg pct where available, else itemAgg pct
  const strengthItems = Object.entries(itemAgg)
    .filter(([id, agg]) => agg.difficulties.length > 0 && Math.min(...agg.difficulties) >= 0.80)
    .map(([id, agg]) => {
      const sa = studentAgg[id];
      const finalPct = sa && sa.attempted > 0 ? Math.round((sa.correct/sa.attempted)*100) : (agg.total > 0 ? Math.round((agg.correct/agg.total)*100) : 0);
      const minDiff = Math.min(...agg.difficulties).toFixed(2);
      const maxDiff = Math.max(...agg.difficulties).toFixed(2);
      return { id, finalPct, minDiff: parseFloat(minDiff), maxDiff: parseFloat(maxDiff) };
    })
    .sort((a, b) => a.minDiff - b.minDiff)  // closest to 0.80 first
    .slice(0, 5);

  let strengthBlock = `ITEMS OF STRENGTH (all sections ≥ 0.80 difficulty — copy these exactly):\n`;
  if (strengthItems.length === 0) {
    strengthBlock += `  None — no items had all sections at difficulty ≥ 0.80\n`;
  } else {
    strengthItems.forEach(s => {
      const diffStr = s.minDiff === s.maxDiff ? s.minDiff.toFixed(2) : `${s.minDiff.toFixed(2)}–${s.maxDiff.toFixed(2)}`;
      strengthBlock += `  Item ${s.id}: ${s.finalPct}% correct (difficulty ${diffStr})\n`;
    });
  }

  // Priority: items where ANY difficulty < 0.55 OR (difficulty < 0.80 AND ANY discrimination < 0.20)
  // The "combined" flag marks items that are both moderately hard and low-discriminating
  const priorityItems = Object.entries(itemAgg)
    .filter(([id, agg]) => {
      if (!agg.difficulties.length || !agg.discriminations.length) return false;
      const lowDiff = Math.min(...agg.difficulties) < 0.55;
      const combined = Math.min(...agg.difficulties) < 0.80 && Math.min(...agg.discriminations) < 0.20;
      return lowDiff || combined;
    })
    .map(([id, agg]) => {
      const sa = studentAgg[id];
      const finalPct = sa && sa.attempted > 0 ? Math.round((sa.correct/sa.attempted)*100) : (agg.total > 0 ? Math.round((agg.correct/agg.total)*100) : 0);
      const finalIncorrect = sa ? (sa.attempted - sa.correct) : (agg.total - agg.correct);
      const minDiff = Math.min(...agg.difficulties);
      const maxDiff = Math.max(...agg.difficulties);
      const minDisc = Math.min(...agg.discriminations);
      const maxDisc = Math.max(...agg.discriminations);
      const lowDiff = minDiff < 0.55;
      const lowDisc = minDisc < 0.20;
      const flag = lowDiff && lowDisc ? "LOW DIFFICULTY + LOW DISCRIMINATION" : lowDiff ? "LOW DIFFICULTY" : "LOW DISCRIMINATION";
      let topWrong = "";
      if (sa) {
        const top = Object.entries(sa.wrongTally).sort((a,b) => b[1]-a[1])[0];
        if (top) topWrong = `"${top[0]}" (n=${top[1]})`;
      } else if (agg.topDistractor) {
        topWrong = `"${agg.topDistractor}" (n=${agg.topDistractorCount})`;
      }
      return { id, finalPct, finalIncorrect, minDiff, maxDiff, minDisc, maxDisc, topWrong, flag,
        studentsWrong: (studentAgg[id]?.studentsWrong || []).sort() };
    })
    .sort((a, b) => a.minDiff - b.minDiff);  // hardest first

  let priorityBlock = `PRIORITY ITEMS (copy these exactly, no additions or changes):\n`;
  if (priorityItems.length === 0) {
    priorityBlock += `  None\n`;
  } else {
    priorityItems.forEach(p => {
      const diffStr = p.minDiff === p.maxDiff ? p.minDiff.toFixed(2) : `${p.minDiff.toFixed(2)}–${p.maxDiff.toFixed(2)}`;
      const discStr = p.minDisc === p.maxDisc ? p.minDisc.toFixed(2) : `${p.minDisc.toFixed(2)}–${p.maxDisc.toFixed(2)}`;
      priorityBlock += `  Item ${p.id} [${p.flag}]: ${p.finalPct}% correct, difficulty ${diffStr}, discrimination ${discStr}, ${p.finalIncorrect} students incorrect`;
      if (p.topWrong) priorityBlock += `, top wrong answer: ${p.topWrong}`;
      priorityBlock += `\n`;
    });
  }

  // Quality flags: items where ANY discrimination < 0.20
  const flagItems = Object.entries(itemAgg)
    .filter(([id, agg]) => agg.discriminations.length > 0 && Math.min(...agg.discriminations) < 0.20)
    .map(([id, agg]) => {
      const minDisc = Math.min(...agg.discriminations);
      const maxDisc = Math.max(...agg.discriminations);
      const pct = agg.total > 0 ? Math.round((agg.correct/agg.total)*100) : 0;
      return { id, minDisc, maxDisc, pct };
    });

  let flagBlock = `ITEM QUALITY FLAGS (copy these exactly):\n`;
  if (flagItems.length === 0) {
    flagBlock += `  None\n`;
  } else {
    flagItems.forEach(f => {
      const discStr = f.minDisc === f.maxDisc ? f.minDisc.toFixed(2) : `${f.minDisc.toFixed(2)}–${f.maxDisc.toFixed(2)}`;
      flagBlock += `  Item ${f.id}: discrimination=${discStr}, ${f.pct}% correct\n`;
    });
  }

  // Discrimination explanation helper
  const discExplain = (minDisc, pct) => {
    if (minDisc === 0) return `${pct}% of students answered correctly, leaving no variance to differentiate high from low performers.`;
    if (minDisc < 0.10) return `Very weak differentiation — likely because ${pct}% correct leaves little variance between high and low performers.`;
    return `Minimal differentiation between high and low performers at ${pct}% correct.`;
  };

  return {
    overallMean, overallMedian, overallHigh, overallLow,
    totalStudents, totalProficient, proficiencyPct, gradeDist,
    strengthItems, priorityItems, flagItems,
    discExplain
  };
}

// ─── Teacher Card ────────────────────────────────────────────────────────────

function TeacherCard({ teacher, onRemove, onAddFile }) {
  const { label, item, student } = teacher;
  const hasItem = !!item;
  const hasStudent = !!student;

  return (
    <div style={{ background: "white", borderRadius: 12, padding: "1rem 1.1rem", boxShadow: "0 2px 12px rgba(30,58,138,0.08)", borderTop: "4px solid #2563eb" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div style={{ fontWeight: 700, color: "#1e3a8a", fontSize: "0.95rem" }}>{label}</div>
        <button onClick={() => onRemove(label)} style={{ background: "none", border: "none", color: "#9ca3af", cursor: "pointer", fontSize: "1rem", padding: 0 }}>✕</button>
      </div>

      {/* File type badges */}
      <div style={{ display: "flex", gap: "0.4rem", marginTop: "0.5rem", flexWrap: "wrap" }}>
        <span style={{ background: hasItem ? "#dcfce7" : "#f3f4f6", color: hasItem ? "#16a34a" : "#9ca3af", borderRadius: 20, padding: "0.15rem 0.55rem", fontSize: "0.72rem", fontWeight: 600 }}>
          {hasItem ? "✓" : "○"} Item Analysis
        </span>
        <span style={{ background: hasStudent ? "#dcfce7" : "#f3f4f6", color: hasStudent ? "#16a34a" : "#9ca3af", borderRadius: 20, padding: "0.15rem 0.55rem", fontSize: "0.72rem", fontWeight: 600 }}>
          {hasStudent ? "✓" : "○"} Student Analysis
        </span>
        {(!hasItem || !hasStudent) && (
          <button onClick={() => onAddFile(label)} style={{ background: "#eff6ff", color: "#3b82f6", border: "1px dashed #93c5fd", borderRadius: 20, padding: "0.15rem 0.55rem", fontSize: "0.72rem", fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
            + Add missing file
          </button>
        )}
      </div>

      {/* Stats */}
      {hasItem && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: "0.4rem", marginTop: "0.6rem" }}>
          {[
            ["Mean", parseFloat(item.summary.QuizMeanScore).toFixed(1) + "%"],
            ["Median", parseFloat(item.summary.QuizMedianScore).toFixed(1) + "%"],
            ["SD", parseFloat(item.summary.QuizStandardDeviation).toFixed(1)]
          ].map(([l, v]) => (
            <div key={l} style={{ background: "#f0f4ff", borderRadius: 7, padding: "0.35rem", textAlign: "center" }}>
              <div style={{ fontWeight: 700, color: "#1e3a8a", fontSize: "0.88rem" }}>{v}</div>
              <div style={{ fontSize: "0.65rem", color: "#6b7280" }}>{l}</div>
            </div>
          ))}
        </div>
      )}
      {hasStudent && (
        <div style={{ marginTop: "0.6rem" }}>
          {/* Proficiency bar */}
          <div style={{ marginBottom: "0.5rem" }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: "0.72rem", fontWeight: 700, marginBottom: "0.2rem" }}>
              <span style={{ color: "#1e3a8a" }}>% Proficient (≥70%)</span>
              <span style={{ color: student.proficiencyPct >= 70 ? "#16a34a" : "#dc2626" }}>{student.proficiencyPct}%</span>
            </div>
            <div style={{ height: 8, background: "#e5e7eb", borderRadius: 4, overflow: "hidden" }}>
              <div style={{ width: student.proficiencyPct + "%", height: "100%", background: student.proficiencyPct >= 70 ? "#16a34a" : student.proficiencyPct >= 50 ? "#d97706" : "#dc2626", borderRadius: 4 }} />
            </div>
            <div style={{ fontSize: "0.68rem", color: "#6b7280", marginTop: "0.15rem" }}>
              {student.proficient} proficient · {student.notProficient} not proficient · {student.students.length} total
            </div>
          </div>
          {/* Grade distribution bar chart */}
          <div>
            <div style={{ fontSize: "0.68rem", fontWeight: 700, color: "#6b7280", marginBottom: "0.3rem", textTransform: "uppercase", letterSpacing: "0.05em" }}>Grade Distribution</div>
            {(() => {
              const PX_PER = 3;
              const maxCount = Math.max(...Object.values(student.gradeDist), 1);
              const chartH = maxCount * PX_PER + 16;
              return (
                <div style={{ display: "flex", alignItems: "flex-end", gap: "0.2rem", height: chartH }}>
                  {[["A","#16a34a"],["B","#65a30d"],["C","#d97706"],["D","#ea580c"],["F","#dc2626"]].map(([g, color]) => {
                    const count = student.gradeDist[g];
                    const barH = count * PX_PER;
                    return (
                      <div key={g} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: "0.1rem", justifyContent: "flex-end" }}>
                        {count > 0 && <div style={{ fontSize: "0.58rem", fontWeight: 700, color }}>{count}</div>}
                        <div style={{ width: "100%", height: barH, background: color, borderRadius: "2px 2px 0 0", minHeight: count > 0 ? 2 : 0 }} />
                        <div style={{ fontSize: "0.6rem", fontWeight: 700, color, lineHeight: 1 }}>{g}</div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Main App ────────────────────────────────────────────────────────────────

function App() {
  const [teachers, setTeachers] = useState([]); // [{ label, item, student }]
  const [report, setReport] = useState(null);
  const [error, setError] = useState("");
  const [dragOver, setDragOver] = useState(false);
  const [activeTab, setActiveTab] = useState("upload");
  const [pendingLabel, setPendingLabel] = useState(null);
  const [itemTableOpen, setItemTableOpen] = useState(true);
  const [studentTableOpen, setStudentTableOpen] = useState(true);
  const [openStudentLists, setOpenStudentLists] = useState({});
  const toggleStudentList = (id) => setOpenStudentLists(prev => ({ ...prev, [id]: !prev[id] }));

  const processFiles = useCallback(async (fileList, forLabel = null) => {
    setError("");
    for (const file of Array.from(fileList)) {
      if (!file.name.endsWith(".csv")) continue;
      try {
        const text = await file.text();
        const rows = parseCSVFull(text);
        const type = detectFileType(rows);
        if (!type) { setError(`Could not detect file type for "${file.name}". Make sure it's a Canvas item or student analysis CSV.`); continue; }

        // Derive label: use forLabel if patching, else from filename
        const fileLabel = forLabel || file.name.replace(/\.csv$/i, "")
          .replace(/[_-]?(item[_-]?analysis|student[_-]?analysis|item|student)[_-]?/gi, "")
          .replace(/[_-]/g, " ").trim() || file.name.replace(/\.csv$/i, "");

        const parsed = type === "item" ? parseItemCSV(rows, fileLabel) : parseStudentCSV(rows, fileLabel);

        setTeachers(prev => {
          const existing = prev.find(t => t.label === fileLabel);
          if (existing) {
            return prev.map(t => t.label === fileLabel ? { ...t, [type]: parsed } : t);
          }
          return [...prev, { label: fileLabel, item: type === "item" ? parsed : null, student: type === "student" ? parsed : null }];
        });
      } catch (e) {
        setError(`Error parsing "${file.name}": ${e.message}`);
      }
    }
    setActiveTab("data");
    setPendingLabel(null);
  }, []);

  const handleDrop = useCallback((e) => {
    e.preventDefault(); setDragOver(false);
    processFiles(e.dataTransfer.files, pendingLabel);
  }, [processFiles, pendingLabel]);

    setReport(buildReport(teachers));

                  "LOW DIFFICULTY": { color:"#dc2626", bg:"#fee2e2" },
                  "LOW DISCRIMINATION": { color:"#d97706", bg:"#fef9c3" },
                  "LOW DIFFICULTY + LOW DISCRIMINATION": { color:"#7c2d12", bg:"#fff7ed" },
                };

                // Build printable text for copy button
                const printText = [
                  "PLC ANALYSIS REPORT",
                  `${teachers.map(t => t.label).join(" · ")}`,
                  "",
                  "── OVERALL PERFORMANCE ──────────────────",
                  `Mean: ${overallMean}%  |  Median: ${overallMedian}%  |  High: ${overallHigh}%  |  Low: ${overallLow}%`,
                  totalStudents > 0 ? `Students: ${totalStudents} total  |  Proficient (≥70%): ${totalProficient} (${proficiencyPct}%)  |  Not proficient: ${notProficient}` : "",
                  totalStudents > 0 ? `Grade distribution: A: ${gradeDist.A}  B: ${gradeDist.B}  C: ${gradeDist.C}  D: ${gradeDist.D}  F: ${gradeDist.F}` : "",
                  "",
                  "── ITEMS OF STRENGTH ────────────────────",
                  ...(strengthItems.length === 0 ? ["None"] : strengthItems.map(s => {
                    const d = s.minDiff === s.maxDiff ? s.minDiff.toFixed(2) : `${s.minDiff.toFixed(2)}–${s.maxDiff.toFixed(2)}`;
                    return `Item ${s.id}: ${s.finalPct}% correct (difficulty ${d})`;
                  })),
                  "",
                  "── PRIORITY ITEMS ───────────────────────",
                  ...(priorityItems.length === 0 ? ["None"] : priorityItems.map(p => {
                    const d = p.minDiff === p.maxDiff ? p.minDiff.toFixed(2) : `${p.minDiff.toFixed(2)}–${p.maxDiff.toFixed(2)}`;
                    const dc = p.minDisc === p.maxDisc ? p.minDisc.toFixed(2) : `${p.minDisc.toFixed(2)}–${p.maxDisc.toFixed(2)}`;
                    return `[${p.flag}] Item ${p.id}: ${p.finalPct}% correct, difficulty ${d}, discrimination ${dc}, ${p.finalIncorrect} incorrect${p.topWrong ? `, top wrong: ${p.topWrong}` : ""}`;
                  })),
                  "",
                  "── ITEM QUALITY FLAGS ───────────────────",
                  ...(flagItems.length === 0 ? ["None"] : flagItems.map(f => {
                    const d = f.minDisc === f.maxDisc ? f.minDisc.toFixed(2) : `${f.minDisc.toFixed(2)}–${f.maxDisc.toFixed(2)}`;
                    return `Item ${f.id}: discrimination=${d}, ${f.pct}% correct. ${discExplain(f.minDisc, f.pct)}`;
                  })),
                ].join("\n");

                return (
                  <div>
                    {/* Report card */}
                    <div id="report-top" style={{ background: "white", borderRadius: 12, padding: "1.75rem 2rem", boxShadow: "0 2px 12px rgba(30,58,138,0.07)" }}>

                      {/* Header */}
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1.25rem", paddingBottom: "1rem", borderBottom: "2px solid #e0e7ff" }}>
                        <div>
                          <h2 style={{ margin: "0 0 0.2rem", color: "#1e3a8a", fontFamily: "'Playfair Display', serif", fontSize: "1.2rem" }}>PLC Analysis Report</h2>
                          <p style={{ margin: 0, color: "#6b7280", fontSize: "0.75rem" }}>{teachers.map(t => t.label).join(" · ")}</p>
                        </div>
                        <button onClick={() => navigator.clipboard?.writeText(printText)}
                          style={{ background: "#f0f4ff", color: "#1e40af", border: "1px solid #bfdbfe", borderRadius: 7, padding: "0.4rem 0.9rem", fontSize: "0.8rem", cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }}>
                          📋 Copy
                        </button>
                      </div>

                      {/* AI note */}
                      <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 8, padding: "0.6rem 0.9rem", marginBottom: "1rem", fontSize: "0.78rem", color: "#92400e", display: "flex", gap: "0.5rem" }}>
                        <span>⚠️</span>
                        <span><strong>Note:</strong> This report is based on item IDs, difficulty scores, discrimination indexes, and distractor text from your CSV files. It does not have access to actual question wording.</span>
                      </div>

                      {/* Flag legend */}
                      <div style={{ background: "#f8fafc", border: "1px solid #e0e7ff", borderRadius: 8, padding: "0.85rem 1rem", marginBottom: "1.5rem" }}>
                        <div style={{ fontSize: "0.72rem", fontWeight: 700, color: "#1e3a8a", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "0.5rem" }}>Priority Item Flag Guide</div>
                        <div style={{ display: "flex", flexDirection: "column", gap: "0.35rem" }}>
                          {[
                            ["LOW DIFFICULTY", "#dc2626", "#fee2e2", "Fewer than 55% of students answered correctly."],
                            ["LOW DISCRIMINATION", "#d97706", "#fef9c3", "Difficulty is below 0.80 and discrimination is below 0.20 — the item is not effectively distinguishing between students who have mastered the content and those who haven't."],
                            ["LOW DIFFICULTY + LOW DISCRIMINATION", "#7c2d12", "#fff7ed", "Both conditions are present — students are struggling and the item is not providing useful diagnostic information."],
                          ].map(([label, color, bg, desc]) => (
                            <div key={label} style={{ display: "flex", gap: "0.6rem", alignItems: "flex-start" }}>
                              <span style={{ background: bg, color, borderRadius: 4, padding: "0.15rem 0.5rem", fontSize: "0.68rem", fontWeight: 800, whiteSpace: "nowrap", marginTop: "0.15rem", flexShrink: 0 }}>{label}</span>
                              <span style={{ fontSize: "0.78rem", color: "#4b5563", lineHeight: 1.5 }}>{desc}</span>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* ── OVERALL PERFORMANCE ── */}
                      <h2 style={{ color: "#1e40af", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.75rem", fontFamily: "'Playfair Display', serif" }}>📊 Overall Performance</h2>
                      {/* Grade dist chart + proficiency */}
                      {totalStudents > 0 && (() => {
                        const maxCount = Math.max(...Object.values(gradeDist), 1);
                        const PX_PER = 4;
                        const chartH = maxCount * PX_PER + 20;
                        return (
                          <div style={{ background: "#f8fafc", borderRadius: 10, padding: "1rem 1.25rem", marginBottom: "1rem", border: "1px solid #e0e7ff", display: "flex", gap: "1.5rem", flexWrap: "wrap", alignItems: "flex-start" }}>
                            <div style={{ flex: 1, minWidth: 160 }}>
                              <div style={{ fontSize: "0.68rem", fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "0.4rem" }}>Grade Distribution</div>
                              <div style={{ display: "flex", alignItems: "flex-end", gap: "0.5rem", height: chartH }}>
                                {["A","B","C","D","F"].map(g => {
                                  const count = gradeDist[g];
                                  const color = GRADE_COLORS[g];
                                  return (
                                    <div key={g} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: "0.2rem", justifyContent: "flex-end" }}>
                                      <div style={{ fontSize: "0.7rem", fontWeight: 700, color, minHeight: "0.9rem" }}>{count > 0 ? count : ""}</div>
                                      <div style={{ width: "100%", height: count * PX_PER, background: color, borderRadius: "4px 4px 0 0", minHeight: count > 0 ? 4 : 0 }} />
                                      <div style={{ fontSize: "0.72rem", fontWeight: 700, color }}>{g}</div>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                            <div style={{ minWidth: 140 }}>
                              <div style={{ fontSize: "0.68rem", fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "0.4rem" }}>Proficiency (≥70%)</div>
                              <div style={{ fontSize: "2rem", fontWeight: 800, color: proficiencyPct >= 70 ? "#16a34a" : proficiencyPct >= 50 ? "#d97706" : "#dc2626", lineHeight: 1 }}>{proficiencyPct}%</div>
                              <div style={{ height: 6, background: "#e5e7eb", borderRadius: 3, margin: "0.4rem 0" }}>
                                <div style={{ width: proficiencyPct + "%", height: "100%", background: proficiencyPct >= 70 ? "#16a34a" : "#d97706", borderRadius: 3 }} />
                              </div>
                              <div style={{ fontSize: "0.72rem", color: "#6b7280" }}>{totalProficient} proficient · {notProficient} not · {totalStudents} total</div>
                            </div>
                          </div>
                        );
                      })()}
                      <div style={{ display: "flex", gap: "0.75rem", flexWrap: "wrap", marginBottom: "1.5rem" }}>
                        {[["Mean", overallMean+"%"], ["Median", overallMedian+"%"], ["High", overallHigh+"%"], ["Low", overallLow+"%"]].map(([l,v]) => (
                          <div key={l} style={{ background: "#f0f4ff", borderRadius: 8, padding: "0.5rem 0.9rem", textAlign: "center", minWidth: 70 }}>
                            <div style={{ fontWeight: 700, color: "#1e3a8a", fontSize: "1rem" }}>{v}</div>
                            <div style={{ fontSize: "0.65rem", color: "#6b7280" }}>{l}</div>
                          </div>
                        ))}
                      </div>

                      {/* ── ITEMS OF STRENGTH ── */}
                      <h2 style={{ color: "#1e40af", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.5rem", fontFamily: "'Playfair Display', serif" }}>✅ Items of Strength</h2>
                      <div style={{ marginBottom: "1.5rem" }}>
                        {strengthItems.length === 0
                          ? <p style={{ color: "#6b7280", fontSize: "0.875rem", margin: 0 }}>No items had difficulty ≥ 0.80 across all sections.</p>
                          : <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.85rem" }}>
                              <thead>
                                <tr style={{ background: "#f8fafc" }}>
                                  {["Item ID", "% Correct", "Difficulty Range"].map(h => (
                                    <th key={h} style={{ padding: "0.45rem 0.75rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "2px solid #e5e7eb", fontSize: "0.78rem" }}>{h}</th>
                                  ))}
                                </tr>
                              </thead>
                              <tbody>
                                {strengthItems.map((s, i) => {
                                  const d = s.minDiff === s.maxDiff ? s.minDiff.toFixed(2) : `${s.minDiff.toFixed(2)}–${s.maxDiff.toFixed(2)}`;
                                  return (
                                    <tr key={s.id} style={{ borderBottom: "1px solid #f3f4f6", background: i%2===0?"white":"#fafafa" }}>
                                      <td style={{ padding: "0.45rem 0.75rem", fontFamily: "monospace", color: "#374151" }}>{s.id}</td>
                                      <td style={{ padding: "0.45rem 0.75rem" }}>
                                        <div style={{ display: "flex", alignItems: "center", gap: "0.4rem" }}>
                                          <div style={{ width: 48, height: 5, background: "#e5e7eb", borderRadius: 3, overflow: "hidden" }}>
                                            <div style={{ width: s.finalPct+"%", height: "100%", background: "#16a34a", borderRadius: 3 }} />
                                          </div>
                                          <span style={{ fontWeight: 700, color: "#16a34a" }}>{s.finalPct}%</span>
                                        </div>
                                      </td>
                                      <td style={{ padding: "0.45rem 0.75rem", color: "#374151" }}>{d}</td>
                                    </tr>
                                  );
                                })}
                              </tbody>
                            </table>
                        }
                      </div>

                      {/* ── PRIORITY ITEMS ── */}
                      <h2 style={{ color: "#1e40af", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.5rem", fontFamily: "'Playfair Display', serif" }}>⚠️ Priority Items</h2>
                      <div style={{ marginBottom: "1.5rem" }}>
                        {priorityItems.length === 0
                          ? <p style={{ color: "#6b7280", fontSize: "0.875rem", margin: 0 }}>No items flagged.</p>
                          : <div style={{ display: "flex", flexDirection: "column", gap: "0.75rem" }}>
                              {priorityItems.map(p => {
                                const d = p.minDiff === p.maxDiff ? p.minDiff.toFixed(2) : `${p.minDiff.toFixed(2)}–${p.maxDiff.toFixed(2)}`;
                                const dc = p.minDisc === p.maxDisc ? p.minDisc.toFixed(2) : `${p.minDisc.toFixed(2)}–${p.maxDisc.toFixed(2)}`;
                                const fs = FLAG_STYLES[p.flag] || { color: "#374151", bg: "#f3f4f6" };
                                return (
                                  <div key={p.id} style={{ border: `1px solid ${fs.color}40`, borderLeft: `4px solid ${fs.color}`, borderRadius: 8, padding: "0.85rem 1rem", background: fs.bg + "88" }}>
                                    <div style={{ display: "flex", alignItems: "center", gap: "0.6rem", marginBottom: "0.5rem", flexWrap: "wrap" }}>
                                      <span style={{ fontFamily: "monospace", fontWeight: 700, fontSize: "0.95rem", color: "#1e3a8a" }}>Item {p.id}</span>
                                      <span style={{ background: fs.bg, color: fs.color, borderRadius: 4, padding: "0.15rem 0.5rem", fontSize: "0.68rem", fontWeight: 800 }}>{p.flag}</span>
                                    </div>
                                    <div style={{ display: "flex", gap: "1.5rem", flexWrap: "wrap", fontSize: "0.82rem", color: "#374151" }}>
                                      <span><strong>{p.finalPct}%</strong> correct</span>
                                      <span><strong>{p.finalIncorrect}</strong> students incorrect</span>
                                      <span>Difficulty: <strong>{d}</strong></span>
                                      <span>Discrimination: <strong>{dc}</strong></span>
                                    </div>
                                    {p.topWrong && (
                                      <div style={{ marginTop: "0.4rem", fontSize: "0.8rem", color: "#4b5563" }}>
                                        Top wrong answer: <em style={{ color: "#1e3a8a" }}>{p.topWrong}</em>
                                      </div>
                                    )}
                                    {p.studentsWrong && p.studentsWrong.length > 0 && (
                                      <div style={{ marginTop: "0.5rem" }}>
                                        <button
                                          onClick={() => toggleStudentList(p.id)}
                                          style={{ background: "none", border: `1px solid ${fs.color}60`, borderRadius: 6, padding: "0.25rem 0.65rem", fontSize: "0.75rem", fontWeight: 600, color: fs.color, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: "0.35rem" }}>
                                          <span>{openStudentLists[p.id] ? "▲" : "▼"}</span>
                                          <span>{p.studentsWrong.length} student{p.studentsWrong.length !== 1 ? "s" : ""} answered incorrectly</span>
                                        </button>
                                        {openStudentLists[p.id] && (
                                          <div style={{ marginTop: "0.4rem", background: "white", border: `1px solid ${fs.color}30`, borderRadius: 6, padding: "0.5rem 0.75rem", display: "flex", flexWrap: "wrap", gap: "0.3rem" }}>
                                            {p.studentsWrong.map(name => (
                                              <span key={name} style={{ background: fs.bg, color: fs.color, borderRadius: 20, padding: "0.15rem 0.55rem", fontSize: "0.75rem", fontWeight: 500 }}>
                                                {name}
                                              </span>
                                            ))}
                                          </div>
                                        )}
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                        }
                      </div>

                      {/* ── ITEM QUALITY FLAGS ── */}
                      <h2 style={{ color: "#1e40af", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.5rem", fontFamily: "'Playfair Display', serif" }}>🔍 Item Quality Flags</h2>
                      <div>
                        {flagItems.length === 0
                          ? <p style={{ color: "#6b7280", fontSize: "0.875rem", margin: 0 }}>No items with discrimination below 0.20.</p>
                          : <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.85rem" }}>
                              <thead>
                                <tr style={{ background: "#f8fafc" }}>
                                  {["Item ID", "Discrimination", "% Correct", "Note"].map(h => (
                                    <th key={h} style={{ padding: "0.45rem 0.75rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "2px solid #e5e7eb", fontSize: "0.78rem" }}>{h}</th>
                                  ))}
                                </tr>
                              </thead>
                              <tbody>
                                {flagItems.map((f, i) => {
                                  const d = f.minDisc === f.maxDisc ? f.minDisc.toFixed(2) : `${f.minDisc.toFixed(2)}–${f.maxDisc.toFixed(2)}`;
                                  return (
                                    <tr key={f.id} style={{ borderBottom: "1px solid #f3f4f6", background: i%2===0?"white":"#fafafa" }}>
                                      <td style={{ padding: "0.45rem 0.75rem", fontFamily: "monospace", color: "#374151" }}>{f.id}</td>
                                      <td style={{ padding: "0.45rem 0.75rem", fontWeight: 700, color: "#d97706" }}>{d}</td>
                                      <td style={{ padding: "0.45rem 0.75rem" }}>{f.pct}%</td>
                                      <td style={{ padding: "0.45rem 0.75rem", color: "#4b5563", fontSize: "0.8rem" }}>{discExplain(f.minDisc, f.pct)}</td>
                                    </tr>
                                  );
                                })}
                              </tbody>
                            </table>
                        }
                      </div>

                    </div>


                  </div>
                );
              })()}
            </div>
          )}

        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
